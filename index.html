<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MayStudio | Secure System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@100;400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50">

    <!-- 초기 로딩/에러 화면 -->
    <div id="init-screen" class="fixed inset-0 z-[10000] bg-white flex flex-col items-center justify-center p-6 transition-all duration-500">
        <div id="loading-spinner" class="spinner"></div>
        <div id="error-icon" class="hidden mb-4 text-red-500 text-5xl"><i class="fas fa-exclamation-triangle"></i></div>
        
        <h1 id="status-title" class="mt-6 text-xl font-black text-slate-800 text-center">시스템 보안 연결 중</h1>
        <p id="status-msg" class="mt-2 text-slate-400 text-sm text-center">Firebase 인스턴스를 초기화하고 있습니다...</p>
        
        <button id="retry-btn" onclick="location.reload()" class="hidden mt-8 px-8 py-3 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition-all">
            연결 재시도
        </button>
    </div>

    <!-- 메인 UI -->
    <div id="app-content" class="invisible opacity-0 transition-opacity duration-1000">
        <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-2 font-black text-blue-600 text-lg">
                    <i class="fas fa-layer-group"></i> MayStudio
                </div>
                <div id="user-indicator" class="text-[10px] font-bold px-3 py-1 bg-slate-100 rounded-full text-slate-500">
                    세션 확인 중...
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 md:p-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- 입력부 -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-2xl font-black text-slate-800">새 견적 작성</h2>
                            <button onclick="saveToCloud()" id="save-btn" class="px-6 py-3 bg-blue-600 text-white rounded-2xl font-black hover:bg-blue-700 transition-all disabled:opacity-50">
                                <i class="fas fa-cloud-upload-alt mr-2"></i> 클라우드 저장
                            </button>
                        </div>

                        <div class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="space-y-2">
                                    <label class="text-xs font-bold text-slate-400 uppercase">고객사 명</label>
                                    <input type="text" id="client" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Client Name">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-bold text-slate-400 uppercase">발행 일자</label>
                                    <input type="date" id="date" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none">
                                </div>
                            </div>

                            <div class="pt-4 border-t border-slate-100">
                                <div id="items-list" class="space-y-3">
                                    <!-- Dynamic Items -->
                                </div>
                                <button onclick="addItem()" class="mt-4 w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold hover:border-blue-300 hover:text-blue-500 transition-all">
                                    + 항목 추가하기
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 히스토리 -->
                <div class="space-y-6">
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                        <h3 class="font-black text-slate-800 mb-6 flex items-center gap-2">
                            <i class="fas fa-history text-blue-500"></i> 최근 기록
                        </h3>
                        <div id="history-container" class="space-y-3">
                            <div class="text-center py-10 text-slate-300 text-sm italic">데이터를 불러오고 있습니다...</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const UI = {
            init: document.getElementById('init-screen'),
            spinner: document.getElementById('loading-spinner'),
            error: document.getElementById('error-icon'),
            title: document.getElementById('status-title'),
            msg: document.getElementById('status-msg'),
            retry: document.getElementById('retry-btn'),
            app: document.getElementById('app-content'),
            indicator: document.getElementById('user-indicator')
        };

        let db, auth, user, currentAppId;

        // --- 재시도 로직 포함된 인증 함수 ---
        async function robustAuth(authInstance, token, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    if (token) {
                        return await signInWithCustomToken(authInstance, token);
                    } else {
                        return await signInAnonymously(authInstance);
                    }
                } catch (err) {
                    const delay = Math.pow(2, i) * 1000;
                    if (i === retries - 1) throw err;
                    await new Promise(res => setTimeout(res, delay));
                }
            }
        }

        async function initSystem() {
            try {
                // 1. Config 파싱
                if (typeof __firebase_config === 'undefined') throw new Error("Firebase Config Missing");
                const firebaseConfig = JSON.parse(__firebase_config);
                currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'default-studio';

                // 2. 초기화
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                UI.msg.innerText = "사용자 인증 세션을 확보하는 중...";

                // 3. 인증 실행 (Rule 3 준수)
                const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                await robustAuth(auth, token);

                // 4. 상태 대기
                onAuthStateChanged(auth, (u) => {
                    if (u) {
                        user = u;
                        UI.indicator.innerText = `ID: ${u.uid.slice(0, 8)}...`;
                        launchApp();
                    } else {
                        throw new Error("Auth State Failed");
                    }
                });

            } catch (err) {
                console.error(err);
                UI.spinner.classList.add('hidden');
                UI.error.classList.remove('hidden');
                UI.title.innerText = "연결 중단됨";
                UI.msg.innerText = "보안 토큰 만료 또는 네트워크 오류가 발생했습니다.";
                UI.retry.classList.remove('hidden');
            }
        }

        function launchApp() {
            UI.init.style.opacity = '0';
            setTimeout(() => {
                UI.init.style.display = 'none';
                UI.app.classList.remove('invisible');
                UI.app.classList.add('opacity-100');
                
                // 데이터 바인딩 시작
                loadHistory();
                addItem(); // 기본 항목 하나 추가
            }, 500);
        }

        // --- 앱 비즈니스 로직 ---
        window.addItem = () => {
            const list = document.getElementById('items-list');
            const row = document.createElement('div');
            row.className = "flex gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-100 items-center animate-slide-up";
            row.innerHTML = `
                <input type="text" placeholder="항목명" class="flex-grow bg-transparent outline-none font-bold text-slate-700">
                <input type="number" placeholder="0" class="w-20 bg-white p-2 rounded-xl text-center font-black outline-none border border-slate-100">
                <button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-500"><i class="fas fa-minus-circle"></i></button>
            `;
            list.appendChild(row);
        };

        window.saveToCloud = async () => {
            if (!user) return;
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> 저장 중...';

            const items = Array.from(document.querySelectorAll('#items-list > div')).map(div => ({
                name: div.querySelector('input[type="text"]').value,
                val: div.querySelector('input[type="number"]').value
            }));

            try {
                // Rule 1 준수된 경로
                await addDoc(collection(db, 'artifacts', currentAppId, 'users', user.uid, 'estimates'), {
                    client: document.getElementById('client').value || '이름 없음',
                    date: document.getElementById('date').value || new Date().toISOString().split('T')[0],
                    items: items,
                    timestamp: serverTimestamp()
                });
                btn.innerHTML = '<i class="fas fa-check"></i> 저장 완료';
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-cloud-upload-alt mr-2"></i> 클라우드 저장';
                }, 2000);
            } catch (e) {
                console.error(e);
                alert("저장 권한이 없거나 연결이 끊겼습니다.");
                btn.disabled = false;
                btn.innerText = "다시 시도";
            }
        };

        function loadHistory() {
            if (!user) return;
            // Rule 1 & 2: 간단한 쿼리 후 메모리에서 처리
            const q = query(collection(db, 'artifacts', currentAppId, 'users', user.uid, 'estimates'));
            onSnapshot(q, (snap) => {
                const container = document.getElementById('history-container');
                container.innerHTML = '';
                if (snap.empty) {
                    container.innerHTML = '<div class="text-center py-10 text-slate-300 text-sm">저장된 내역이 없습니다.</div>';
                    return;
                }
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    const card = document.createElement('div');
                    card.className = "p-4 bg-white border border-slate-100 rounded-2xl hover:shadow-md transition-all group relative";
                    card.innerHTML = `
                        <div class="text-xs text-slate-400 font-bold mb-1">${d.date}</div>
                        <div class="font-black text-slate-800">${d.client}</div>
                        <button onclick="deleteData('${docSnap.id}')" class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition-all">
                            <i class="fas fa-trash-alt text-xs"></i>
                        </button>
                    `;
                    container.appendChild(card);
                });
            }, (err) => {
                console.error("Snapshot Error:", err);
            });
        }

        window.deleteData = async (id) => {
            if(confirm('이 기록을 영구 삭제할까요?')) {
                await deleteDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'estimates', id));
            }
        };

        // 초기 시작
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            initSystem();
        });
    </script>

    <style>
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slide-up 0.3s ease-out forwards; }
    </style>
</body>
</html>
