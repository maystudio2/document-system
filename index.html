<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이스튜디오 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.025em; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        @media print {
            .no-print { display: none !important; }
            #print-area { display: block !important; }
            body { background: white !important; padding: 0 !important; }
            @page { size: A4; margin: 0; }
        }
        #print-area { display: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* 로딩 애니메이션 커스텀 */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">
    <div id="app">
        <!-- 초기 로딩 스크린 -->
        <div id="loading-overlay" class="fixed inset-0 flex items-center justify-center bg-white z-[100] transition-opacity duration-500">
            <div class="flex flex-col items-center">
                <div class="loader mb-4"></div>
                <p class="font-bold text-slate-500 animate-pulse">시스템 자원을 동기화하는 중...</p>
                <button id="force-start-btn" onclick="hideLoading()" class="mt-8 text-xs text-slate-300 hover:text-slate-600 underline hidden">수동 시작하기</button>
            </div>
        </div>

        <!-- 메인 대시보드 (초기엔 hidden) -->
        <div id="dashboard-section" class="hidden min-h-screen no-print">
            <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-4 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="bg-blue-600 text-white w-10 h-10 flex items-center justify-center rounded-xl font-black shadow-lg shadow-blue-200">M</div>
                    <h2 class="text-xl font-black tracking-tight">MayStudio <span class="text-blue-600">Portal</span></h2>
                </div>
                <div class="flex items-center gap-4">
                    <div class="hidden md:flex items-center px-3 py-1 bg-slate-100 rounded-full">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-ping mr-2"></div>
                        <span id="user-status" class="text-[10px] font-black text-slate-500 uppercase">Connected</span>
                    </div>
                    <button id="logout-btn" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                        <i class="fas fa-sign-out-alt text-lg"></i>
                    </button>
                </div>
            </header>

            <main class="max-w-[1600px] mx-auto p-6 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- 문서 작성 섹션 -->
                <div class="lg:col-span-8 space-y-6">
                    <div class="bg-white rounded-[32px] shadow-xl shadow-slate-200/50 border border-slate-200 overflow-hidden">
                        <div class="p-8 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-slate-50/50">
                            <div>
                                <h3 class="text-2xl font-black text-slate-800 tracking-tight">견적서 생성기</h3>
                                <p class="text-slate-400 font-medium text-sm">새로운 프로젝트의 견적을 산출합니다.</p>
                            </div>
                            <div class="flex bg-white p-1 rounded-2xl border border-slate-200 shadow-sm">
                                <button onclick="setVatMode('exclude')" id="vat-ex-btn" class="px-5 py-2.5 rounded-xl text-sm font-black transition-all">VAT 별도</button>
                                <button onclick="setVatMode('include')" id="vat-in-btn" class="px-5 py-2.5 rounded-xl text-sm font-black transition-all">VAT 포함</button>
                            </div>
                        </div>

                        <div class="p-8 space-y-8">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div class="md:col-span-2">
                                    <label class="block text-[11px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-wider">Client Name</label>
                                    <input type="text" id="client-name" placeholder="고객사 또는 성함을 입력하세요" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold transition-all">
                                </div>
                                <div>
                                    <label class="block text-[11px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-wider">Issue Date</label>
                                    <input type="date" id="doc-date" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold transition-all">
                                </div>
                            </div>

                            <div class="space-y-4">
                                <div class="flex justify-between items-center px-1">
                                    <h4 class="font-black text-slate-800 flex items-center gap-2">
                                        <i class="fas fa-layer-group text-blue-600"></i> 세부 품목 리스트
                                    </h4>
                                    <button onclick="addItemRow()" class="text-xs font-black bg-blue-50 text-blue-600 px-4 py-2 rounded-full hover:bg-blue-600 hover:text-white transition-all">+ 항목 추가</button>
                                </div>
                                <div id="items-list" class="space-y-3">
                                    <!-- 항목 행 자동 생성 -->
                                </div>
                            </div>
                        </div>

                        <div class="bg-slate-900 p-8 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div class="text-center md:text-left">
                                <span class="text-blue-400 font-black text-[10px] uppercase tracking-[0.2em]">Final Estimated Amount</span>
                                <div id="total-amount-display" class="text-4xl font-black text-white tracking-tighter">0원</div>
                            </div>
                            <div class="flex gap-3 w-full md:w-auto">
                                <button onclick="openSaveModal()" class="flex-1 md:flex-none px-8 py-4 bg-white/10 text-white rounded-2xl font-black hover:bg-white/20 transition-all border border-white/10">
                                    <i class="fas fa-cloud-upload-alt mr-2"></i> 클라우드 저장
                                </button>
                                <button onclick="printEstimate()" class="flex-1 md:flex-none px-10 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-xl shadow-blue-900/20 hover:bg-blue-500 hover:-translate-y-1 transition-all">
                                    <i class="fas fa-print mr-2"></i> 견적서 발행
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 보관함 사이드바 -->
                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-white rounded-[32px] shadow-lg shadow-slate-200/50 border border-slate-200 p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-black text-lg text-slate-800 flex items-center gap-2">
                                <i class="fas fa-folder-open text-blue-600"></i> 보관함
                            </h3>
                            <button onclick="resetSystem()" class="text-slate-300 hover:text-blue-600 transition-colors">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>
                        <div id="repo-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                            <div class="text-center py-20 text-slate-300 font-bold italic">목록을 불러오고 있습니다...</div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 저장 팝업 -->
    <div id="save-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-10 shadow-2xl scale-95 animate-in fade-in zoom-in duration-300">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-2xl mb-6">
                <i class="fas fa-save"></i>
            </div>
            <h4 class="text-2xl font-black text-slate-800 mb-2">보관함 이름 지정</h4>
            <p class="text-slate-400 text-sm font-medium mb-8">나중에 다시 불러올 때 확인할 제목을 입력해주세요.</p>
            <input type="text" id="save-title-input" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold mb-8" placeholder="예: 24년 5월 홍길동 견적 건">
            <div class="flex gap-3">
                <button onclick="closeSaveModal()" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-black hover:bg-slate-200 transition-all">취소</button>
                <button onclick="processSave()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">저장하기</button>
            </div>
        </div>
    </div>

    <!-- 인쇄 전용 레이아웃 (Print Area) -->
    <div id="print-area"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, serverTimestamp, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 설정
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'maystudio-sys-v2';

        // 공급자 고정 정보
        const PROVIDER = {
            bizNo: "322-15-02616",
            name: "메이스튜디오",
            ceo: "정윤희",
            addr: "창원시 성산구 중앙대로 33 대흥인터빌 519호",
            tel: "010-3560-5859",
            email: "contact@maystudio.kr",
            bank: "농협 302-1456-7890-11 (정윤희)"
        };

        let currentUid = null;
        let currentVatMode = 'exclude';
        let activeDocId = null;

        // 1. 초기 인증 처리 (Rule 3 준수)
        const initSystem = async () => {
            try {
                // 수동 시작 버튼 노출 (네트워크 지연 대비)
                setTimeout(() => { document.getElementById('force-start-btn').classList.remove('hidden'); }, 3000);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error:", err);
                hideLoading(); // 에러 시에도 일단 화면은 보여줌
            }
        };

        // 2. 인증 상태 리스너
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUid = user.uid;
                hideLoading();
                setupDashboard();
            }
        });

        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.add('opacity-0');
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('dashboard-section').classList.remove('hidden');
            }, 500);
        }

        function setupDashboard() {
            document.getElementById('doc-date').value = new Date().toISOString().split('T')[0];
            setVatMode('exclude');
            if (document.getElementById('items-list').children.length === 0) {
                addItemRow();
            }
            fetchRepository();
        }

        // --- 기능 함수들 ---

        window.setVatMode = (mode) => {
            currentVatMode = mode;
            const exBtn = document.getElementById('vat-ex-btn');
            const inBtn = document.getElementById('vat-in-btn');
            
            if(mode === 'exclude') {
                exBtn.className = "px-5 py-2.5 rounded-xl text-sm font-black bg-blue-600 text-white shadow-md shadow-blue-100";
                inBtn.className = "px-5 py-2.5 rounded-xl text-sm font-black text-slate-400 hover:text-slate-600";
            } else {
                inBtn.className = "px-5 py-2.5 rounded-xl text-sm font-black bg-blue-600 text-white shadow-md shadow-blue-100";
                exBtn.className = "px-5 py-2.5 rounded-xl text-sm font-black text-slate-400 hover:text-slate-600";
            }
            calculateAmount();
        };

        window.addItemRow = (name = "", qty = 1, price = "") => {
            const list = document.getElementById('items-list');
            const div = document.createElement('div');
            div.className = "item-row flex flex-wrap md:flex-nowrap gap-4 p-5 bg-white border border-slate-100 rounded-2xl items-center hover:border-blue-300 hover:shadow-lg hover:shadow-slate-100 transition-all group";
            div.innerHTML = `
                <div class="flex-grow min-w-[200px]">
                    <input type="text" value="${name}" placeholder="과업 내용을 입력하세요" class="row-name w-full bg-transparent outline-none font-bold text-slate-700 placeholder:text-slate-300">
                </div>
                <div class="flex items-center gap-2 bg-slate-50 px-3 py-1 rounded-xl">
                    <span class="text-[10px] font-black text-slate-400">QTY</span>
                    <input type="number" value="${qty}" class="row-qty w-12 bg-transparent text-center outline-none font-black text-slate-700">
                </div>
                <div class="flex items-center gap-2 bg-slate-50 px-3 py-1 rounded-xl min-w-[140px]">
                    <span class="text-[10px] font-black text-slate-400">UNIT</span>
                    <input type="number" value="${price}" placeholder="단가" class="row-price w-full bg-transparent text-right outline-none font-black text-blue-600">
                </div>
                <button onclick="this.parentElement.remove(); calculateAmount();" class="text-slate-200 hover:text-red-500 transition-colors p-2">
                    <i class="fas fa-minus-circle"></i>
                </button>
            `;
            list.appendChild(div);
            div.querySelectorAll('input').forEach(inp => inp.addEventListener('input', calculateAmount));
            calculateAmount();
        };

        window.calculateAmount = () => {
            let sum = 0;
            document.querySelectorAll('.item-row').forEach(row => {
                const q = parseFloat(row.querySelector('.row-qty').value) || 0;
                const p = parseFloat(row.querySelector('.row-price').value) || 0;
                sum += (q * p);
            });

            const total = (currentVatMode === 'exclude') ? Math.round(sum * 1.1) : sum;
            document.getElementById('total-amount-display').innerText = total.toLocaleString() + '원';
            return { subtotal: sum, total: total };
        };

        // --- 저장 로직 ---

        window.openSaveModal = () => {
            const client = document.getElementById('client-name').value;
            if(!client) return alert('클라이언트명을 입력해주세요.');
            document.getElementById('save-title-input').value = `[견적] ${client}_${new Date().toLocaleDateString()}`;
            document.getElementById('save-modal').classList.remove('hidden');
        };

        window.closeSaveModal = () => document.getElementById('save-modal').classList.add('hidden');

        window.processSave = async () => {
            if(!currentUid) return;
            const title = document.getElementById('save-title-input').value;
            const client = document.getElementById('client-name').value;
            const date = document.getElementById('doc-date').value;
            const items = Array.from(document.querySelectorAll('.item-row')).map(r => ({
                name: r.querySelector('.row-name').value,
                qty: r.querySelector('.row-qty').value,
                price: r.querySelector('.row-price').value
            }));

            const payload = {
                title, client, date, items,
                vatMode: currentVatMode,
                updatedAt: serverTimestamp()
            };

            const colRef = collection(db, 'artifacts', appId, 'users', currentUid, 'estimates');
            try {
                if(activeDocId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', currentUid, 'estimates', activeDocId), payload);
                } else {
                    await addDoc(colRef, payload);
                }
                closeSaveModal();
                alert('보관함에 저장되었습니다.');
            } catch (e) { console.error(e); }
        };

        function fetchRepository() {
            if(!currentUid) return;
            const q = query(collection(db, 'artifacts', appId, 'users', currentUid, 'estimates'));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('repo-list');
                list.innerHTML = '';
                if(snap.empty) {
                    list.innerHTML = '<div class="text-center py-20 text-slate-300 font-medium">저장된 견적이 없습니다.</div>';
                    return;
                }
                snap.forEach(d => {
                    const data = d.data();
                    const card = document.createElement('div');
                    card.className = "group p-4 bg-slate-50 border border-slate-100 rounded-2xl cursor-pointer hover:border-blue-500 hover:bg-white transition-all flex justify-between items-center";
                    card.onclick = () => {
                        activeDocId = d.id;
                        document.getElementById('client-name').value = data.client;
                        document.getElementById('doc-date').value = data.date;
                        setVatMode(data.vatMode);
                        document.getElementById('items-list').innerHTML = '';
                        data.items.forEach(it => addItemRow(it.name, it.qty, it.price));
                    };
                    card.innerHTML = `
                        <div class="truncate pr-4">
                            <h5 class="font-black text-slate-800 text-sm truncate">${data.title}</h5>
                            <p class="text-[10px] font-bold text-slate-400 mt-1">${data.date} 발행</p>
                        </div>
                        <button onclick="event.stopPropagation(); deleteDoc(doc(db, 'artifacts', '${appId}', 'users', '${currentUid}', 'estimates', '${d.id}'))" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    `;
                    list.appendChild(card);
                });
            }, (err) => console.error(err));
        }

        // --- 인쇄 로직 ---

        window.printEstimate = () => {
            const client = document.getElementById('client-name').value || "귀하";
            const dateStr = document.getElementById('doc-date').value;
            const { subtotal, total } = calculateAmount();
            const vat = total - subtotal;
            
            const rows = Array.from(document.querySelectorAll('.item-row')).map(row => {
                const n = row.querySelector('.row-name').value || "(품명 없음)";
                const q = parseFloat(row.querySelector('.row-qty').value) || 0;
                const p = parseFloat(row.querySelector('.row-price').value) || 0;
                // 세금 계산 모드에 따른 단가 표시 조정
                const displayPrice = (currentVatMode === 'exclude') ? p : Math.round(p / 1.1);
                return { n, q, p: displayPrice, sub: q * displayPrice };
            });

            const printHtml = `
                <div style="width:210mm; min-height:297mm; padding:25mm 20mm; background:white; margin:0 auto; font-family:'Noto Sans KR'; color:#333;">
                    <div style="display:flex; justify-content:space-between; align-items: flex-start; margin-bottom:60px;">
                        <h1 style="font-size:54px; font-weight:900; letter-spacing:15px; margin:0; border-bottom:8px solid #3b82f6; padding-bottom:10px;">견적서</h1>
                        <div style="text-align:right;">
                            <p style="font-size:14px; color:#999; margin:0;">Document No. MS-${Date.now().toString().slice(-6)}</p>
                            <p style="font-size:16px; font-weight:bold; margin:5px 0;">발행일: ${dateStr}</p>
                        </div>
                    </div>

                    <div style="display:flex; justify-content:space-between; margin-bottom:50px; gap:40px;">
                        <div style="flex:1;">
                            <div style="font-size:24px; font-weight:900; margin-bottom:10px; padding-bottom:5px; border-bottom:2px solid #333;">${client} 貴下</div>
                            <p style="font-size:14px; line-height:1.6; color:#666;">아래와 같이 견적 내용을 제출합니다.<br>추가 문의사항은 언제든 연락 부탁드립니다.</p>
                        </div>
                        <div style="width:380px;">
                            <table style="width:100%; border-collapse:collapse; font-size:12px; border:1.5px solid #333;">
                                <tr>
                                    <td rowspan="4" style="width:30px; background:#f4f4f4; text-align:center; font-weight:bold; border-right:1px solid #333;">공<br>급<br>자</td>
                                    <td style="padding:6px; background:#fafafa; border-bottom:1px solid #ddd; width:80px;">사업자번호</td>
                                    <td colspan="3" style="padding:6px; border-bottom:1px solid #ddd; font-weight:bold;">${PROVIDER.bizNo}</td>
                                </tr>
                                <tr>
                                    <td style="padding:6px; background:#fafafa; border-bottom:1px solid #ddd;">상호</td>
                                    <td style="padding:6px; border-bottom:1px solid #ddd; font-weight:bold;">${PROVIDER.name}</td>
                                    <td style="padding:6px; background:#fafafa; border-bottom:1px solid #ddd; width:40px;">성명</td>
                                    <td style="padding:6px; border-bottom:1px solid #ddd;">${PROVIDER.ceo} (인)</td>
                                </tr>
                                <tr>
                                    <td style="padding:6px; background:#fafafa; border-bottom:1px solid #ddd;">주소</td>
                                    <td colspan="3" style="padding:6px; border-bottom:1px solid #ddd; font-size:11px;">${PROVIDER.addr}</td>
                                </tr>
                                <tr>
                                    <td style="padding:6px; background:#fafafa;">연락처</td>
                                    <td colspan="3" style="padding:6px;">${PROVIDER.tel} / ${PROVIDER.email}</td>
                                </tr>
                            </table>
                        </div>
                    </div>

                    <div style="margin-bottom:10px; font-weight:bold; font-size:16px;">[ 견적 세부 내역 ]</div>
                    <table style="width:100%; border-collapse:collapse; border-top:2.5px solid #333; margin-bottom:30px;">
                        <thead>
                            <tr style="background:#f8fafc; font-size:13px;">
                                <th style="border-bottom:1px solid #333; padding:12px; text-align:left;">품명 및 과업내용</th>
                                <th style="border-bottom:1px solid #333; padding:12px; width:60px;">수량</th>
                                <th style="border-bottom:1px solid #333; padding:12px; width:100px; text-align:right;">단가</th>
                                <th style="border-bottom:1px solid #333; padding:12px; width:120px; text-align:right;">금액</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows.map(r => `
                                <tr style="font-size:13px; border-bottom:1px solid #eee;">
                                    <td style="padding:15px 12px; font-weight:500;">${r.n}</td>
                                    <td style="padding:15px 12px; text-align:center;">${r.q}</td>
                                    <td style="padding:15px 12px; text-align:right;">${r.p.toLocaleString()}</td>
                                    <td style="padding:15px 12px; text-align:right; font-weight:bold;">${r.sub.toLocaleString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>

                    <div style="display:flex; justify-content: flex-end; margin-bottom:60px;">
                        <div style="width:300px;">
                            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee; font-size:14px;">
                                <span>공급가액</span>
                                <span>${subtotal.toLocaleString()} 원</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee; font-size:14px;">
                                <span>부가가치세 (10%)</span>
                                <span>${vat.toLocaleString()} 원</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; padding:20px 0; font-size:22px; font-weight:900; color:#3b82f6;">
                                <span>합계금액</span>
                                <span>${total.toLocaleString()} 원</span>
                            </div>
                        </div>
                    </div>

                    <div style="background:#f9fafb; padding:25px; border-radius:10px; font-size:13px; line-height:1.8; color:#666;">
                        <h4 style="margin:0 0 10px 0; color:#333; font-weight:bold;">안내사항 및 결제정보</h4>
                        1. 계좌번호: <strong style="color:#333;">${PROVIDER.bank}</strong><br>
                        2. 견적 유효기간: 발행일로부터 1개월 이내<br>
                        3. 결제 조건: 계약 시 50%, 과업 완료 후 50% 입금 (별도 협의 가능)<br>
                        4. 위 견적은 과업 범위 변경 시 재산출될 수 있습니다.
                    </div>
                </div>
            `;

            document.getElementById('print-area').innerHTML = printHtml;
            window.print();
        };

        window.resetSystem = () => {
            if(confirm('진행중인 내용이 초기화됩니다. 계속하시겠습니까?')) {
                location.reload();
            }
        };

        window.initAuth = initSystem;
        window.onload = initSystem;
    </script>
</body>
</html>
