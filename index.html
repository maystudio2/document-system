<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MayStudio Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app">
        <!-- 로딩 -->
        <div id="loading" class="fixed inset-0 flex flex-col items-center justify-center bg-white z-[100]">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <p class="text-slate-500 text-sm font-bold">시스템 연결 중...</p>
        </div>

        <!-- 로그인 섹션 -->
        <div id="login-section" class="hidden min-h-screen flex items-center justify-center p-4">
            <div class="max-w-md w-full glass-morphism p-8 rounded-2xl shadow-xl border border-slate-200">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-black text-slate-800 tracking-tight">MayStudio</h1>
                    <p class="text-slate-500 mt-2 font-medium">관리자 전용 로그인</p>
                </div>
                <form id="login-form" class="space-y-5">
                    <div>
                        <label class="block text-[11px] font-black text-slate-400 uppercase tracking-wider mb-1">이메일 계정</label>
                        <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none transition font-medium" placeholder="contact@maystudio.kr" required>
                    </div>
                    <div>
                        <label class="block text-[11px] font-black text-slate-400 uppercase tracking-wider mb-1">비밀번호</label>
                        <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none transition font-medium" placeholder="••••••••" required>
                    </div>
                    <button type="submit" id="login-submit-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition">
                        로그인하기
                    </button>
                </form>
                <div id="login-error" class="mt-4 p-3 bg-red-50 text-red-500 text-xs text-center rounded-lg font-bold hidden"></div>
            </div>
        </div>

        <!-- 대시보드 섹션 -->
        <div id="dashboard-section" class="hidden min-h-screen">
            <nav class="bg-white border-b border-slate-100 px-6 py-4 flex justify-between items-center sticky top-0 z-40">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-600 text-white p-2 rounded-lg shadow-lg">
                        <i class="fas fa-layer-group text-sm"></i>
                    </div>
                    <span class="text-lg font-black text-slate-800">MayStudio <span class="font-light text-slate-400 ml-1">Portal</span></span>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="logout-btn" class="p-2.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition">
                        <i class="fas fa-sign-out-alt text-lg"></i>
                    </button>
                </div>
            </nav>

            <main class="max-w-4xl mx-auto p-6">
                <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-8">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="font-black text-xl text-slate-800">관리자 메모장</h2>
                        <button id="add-note-btn" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-lg shadow-blue-100">
                            추가
                        </button>
                    </div>
                    <div id="notes-container" class="grid grid-cols-1 gap-4">
                        <!-- 메모가 여기에 로드됨 -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        // Firebase 최신 안정 버전(11.x) 사용
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBY-6GCqHa3H4xifEc6Pi4Uulp6V5z9Yv0",
            authDomain: "document-system-8c160.firebaseapp.com",
            projectId: "document-system-8c160",
            storageBucket: "document-system-8c160.firebasestorage.app",
            messagingSenderId: "677153604991",
            appId: "1:677153604991:web:cacd54c35fe4ae87ddc64a",
            measurementId: "G-178W5RGV2C"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'maystudio-admin-portal';

        const loading = document.getElementById('loading');
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');

        // 인증 상태 리스너
        onAuthStateChanged(auth, (user) => {
            loading.classList.add('hidden');
            if (user) {
                loginSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                loadNotes();
            } else {
                loginSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
            }
        });

        // 로그인 처리
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) {
                errorDiv.textContent = "로그인 실패: 정보를 확인하세요.";
                errorDiv.classList.remove('hidden');
            }
        });

        // 로그아웃
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // 메모 로드 및 실시간 감시 (onSnapshot)
        function loadNotes() {
            const notesCol = collection(db, 'artifacts', appId, 'public', 'data', 'admin_notes');
            onSnapshot(notesCol, (snapshot) => {
                const container = document.getElementById('notes-container');
                container.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const note = docSnap.data();
                    const div = document.createElement('div');
                    div.className = "p-5 bg-slate-50 rounded-2xl flex justify-between items-center";
                    div.innerHTML = `
                        <span class="font-medium text-slate-700">${note.content}</span>
                        <button onclick="window.deleteNote('${docSnap.id}')" class="text-red-400 hover:text-red-600">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    `;
                    container.appendChild(div);
                });
            });
        }

        // 메모 추가
        document.getElementById('add-note-btn').addEventListener('click', async () => {
            const content = prompt("내용을 입력하세요:");
            if (!content) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'admin_notes'), {
                    content,
                    createdAt: serverTimestamp()
                });
            } catch (e) {
                console.error(e);
            }
        });

        // 메모 삭제 (전역 윈도우 함수로 할당)
        window.deleteNote = async (id) => {
            if(!confirm('삭제할까요?')) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'admin_notes', id));
        };
    </script>
</body>
</html>
