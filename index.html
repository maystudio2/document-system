<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이스튜디오 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.025em; overflow-x: hidden; }
        
        /* 로딩 애니메이션 레이어 */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease-out, visibility 0.4s;
        }

        .loader-ring {
            width: 48px;
            height: 48px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 1);
        }

        @media print {
            .no-print { display: none !important; }
            #print-area { display: block !important; }
            body { background: white !important; }
        }
        #print-area { display: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- 로딩 오버레이 -->
    <div id="loading-overlay">
        <div class="loader-ring"></div>
        <p class="mt-4 font-bold text-slate-400 animate-pulse">데이터 동기화 및 보안 확인 중...</p>
        <button id="bypass-btn" onclick="forceUnlock()" class="mt-6 px-4 py-2 text-xs font-bold text-blue-500 border border-blue-200 rounded-lg hover:bg-blue-50 transition-all opacity-0 pointer-events-none">
            강제 진입하기
        </button>
    </div>

    <div id="app" class="min-h-screen opacity-0 transition-opacity duration-700">
        <!-- 네비게이션 바 -->
        <nav class="sticky top-0 z-40 w-full bg-white/80 backdrop-blur-md border-b border-slate-200 no-print">
            <div class="max-w-[1400px] mx-auto px-6 h-16 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black">M</div>
                    <span class="font-black text-xl tracking-tight">MayStudio <span class="text-blue-600">Portal</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="conn-status" class="text-[10px] font-black px-2 py-1 bg-slate-100 text-slate-400 rounded-full flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-slate-300 rounded-full"></span> OFFLINE
                    </span>
                    <button onclick="location.reload()" class="p-2 text-slate-400 hover:text-blue-600 transition-all">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>
        </nav>

        <!-- 메인 콘텐츠 -->
        <main class="max-w-[1400px] mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 no-print">
            <!-- 왼쪽: 견적서 작성기 -->
            <section class="lg:col-span-8 space-y-6">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-8 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h2 class="text-2xl font-black text-slate-800">새 견적서 작성</h2>
                            <p class="text-slate-400 text-sm font-medium">프로젝트의 상세 항목과 수량을 입력하세요.</p>
                        </div>
                        <div class="flex bg-slate-100 p-1 rounded-xl">
                            <button onclick="setVat('exclude')" id="vat-ex" class="px-4 py-2 rounded-lg text-xs font-black transition-all">VAT 별도</button>
                            <button onclick="setVat('include')" id="vat-in" class="px-4 py-2 rounded-lg text-xs font-black transition-all">VAT 포함</button>
                        </div>
                    </div>

                    <div class="p-8 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[11px] font-black text-slate-400 uppercase tracking-wider ml-1">Client</label>
                                <input type="text" id="client-name" placeholder="고객사/성함" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold transition-all">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[11px] font-black text-slate-400 uppercase tracking-wider ml-1">Date</label>
                                <input type="date" id="doc-date" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold transition-all">
                            </div>
                        </div>

                        <div class="space-y-4 pt-4">
                            <div class="flex justify-between items-end">
                                <h3 class="font-black text-slate-700 flex items-center gap-2">
                                    <i class="fas fa-list-ul text-blue-600"></i> 세부 과업 리스트
                                </h3>
                                <button onclick="addRow()" class="text-xs font-black text-blue-600 hover:underline">+ 항목 추가</button>
                            </div>
                            <div id="items-container" class="space-y-3">
                                <!-- 항목 행 -->
                            </div>
                        </div>
                    </div>

                    <div class="p-8 bg-slate-900 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div class="text-center md:text-left">
                            <span class="text-blue-400 font-black text-[10px] uppercase tracking-widest">Estimated Total</span>
                            <div id="display-total" class="text-3xl font-black text-white mt-1">0원</div>
                        </div>
                        <div class="flex gap-2 w-full md:w-auto">
                            <button onclick="showSaveModal()" class="flex-1 md:flex-none px-6 py-4 bg-white/10 text-white rounded-2xl font-black hover:bg-white/20 border border-white/10 transition-all">
                                <i class="fas fa-cloud-upload-alt mr-2"></i> 저장
                            </button>
                            <button onclick="handlePrint()" class="flex-1 md:flex-none px-10 py-4 bg-blue-600 text-white rounded-2xl font-black hover:bg-blue-500 shadow-xl shadow-blue-900/20 hover:-translate-y-0.5 transition-all">
                                <i class="fas fa-print mr-2"></i> 발행
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 오른쪽: 클라우드 보관함 -->
            <aside class="lg:col-span-4">
                <div class="bg-white rounded-3xl border border-slate-200 p-6 h-fit sticky top-24">
                    <h3 class="font-black text-lg text-slate-800 flex items-center gap-2 mb-6">
                        <i class="fas fa-database text-blue-600"></i> 내 보관함
                    </h3>
                    <div id="history-list" class="space-y-3 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
                        <div class="py-12 text-center text-slate-300 italic font-medium">동기화 중...</div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- 저장 모달 -->
    <div id="save-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-8 shadow-2xl animate-in fade-in zoom-in duration-300">
            <h4 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-2">
                <i class="fas fa-save text-blue-600"></i> 보관함 이름
            </h4>
            <input type="text" id="save-title" placeholder="프로젝트명을 입력하세요" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold mb-6">
            <div class="flex gap-2">
                <button onclick="closeSaveModal()" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-black hover:bg-slate-200">취소</button>
                <button id="save-confirm-btn" onclick="saveToCloud()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black hover:bg-blue-700 shadow-lg shadow-blue-200">저장하기</button>
            </div>
        </div>
    </div>

    <div id="print-area"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 초기화
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'may-studio-sys-v3';

        let user = null;
        let vatMode = 'exclude';
        let currentDocId = null;

        // 1. 강제 해제 타이머 (네트워크 지연 대비)
        const safetyTimer = setTimeout(() => {
            const btn = document.getElementById('bypass-btn');
            if(btn) {
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            }
        }, 3000);

        window.forceUnlock = () => {
            console.warn("Safety Unlock Triggered");
            unlockUI();
        };

        const unlockUI = () => {
            clearTimeout(safetyTimer);
            document.getElementById('loading-overlay').style.opacity = '0';
            document.getElementById('loading-overlay').style.visibility = 'hidden';
            document.getElementById('app').classList.remove('opacity-0');
        };

        // 2. 인증 로직
        const startAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Fail:", err);
                unlockUI(); // 실패해도 일단 UI는 보여줌 (오프라인 모드처럼 작동)
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                document.getElementById('conn-status').innerHTML = '<span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-ping"></span> ONLINE';
                document.getElementById('conn-status').className = "text-[10px] font-black px-2 py-1 bg-green-50 text-green-600 rounded-full flex items-center gap-1.5";
                unlockUI();
                initApp();
                loadHistory();
            }
        });

        // 3. 앱 초기화
        function initApp() {
            document.getElementById('doc-date').value = new Date().toISOString().split('T')[0];
            setVat('exclude');
            if(document.getElementById('items-container').children.length === 0) {
                addRow();
            }
        }

        // --- 핵심 기능 함수 ---

        window.setVat = (mode) => {
            vatMode = mode;
            const ex = document.getElementById('vat-ex');
            const inB = document.getElementById('vat-in');
            if(mode === 'exclude') {
                ex.className = "px-4 py-2 rounded-lg text-xs font-black bg-blue-600 text-white shadow-md shadow-blue-100 transition-all";
                inB.className = "px-4 py-2 rounded-lg text-xs font-black text-slate-400 hover:text-slate-600 transition-all";
            } else {
                inB.className = "px-4 py-2 rounded-lg text-xs font-black bg-blue-600 text-white shadow-md shadow-blue-100 transition-all";
                ex.className = "px-4 py-2 rounded-lg text-xs font-black text-slate-400 hover:text-slate-600 transition-all";
            }
            calculate();
        };

        window.addRow = (name = '', qty = 1, price = '') => {
            const container = document.getElementById('items-container');
            const div = document.createElement('div');
            div.className = "row-item group flex flex-wrap md:flex-nowrap gap-3 items-center p-4 bg-white border border-slate-100 rounded-2xl hover:border-blue-200 transition-all";
            div.innerHTML = `
                <div class="flex-grow min-w-[200px]">
                    <input type="text" value="${name}" placeholder="작업 내용" class="row-name w-full bg-transparent outline-none font-bold text-slate-700 placeholder:text-slate-300">
                </div>
                <div class="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-xl">
                    <span class="text-[9px] font-black text-slate-400">QTY</span>
                    <input type="number" value="${qty}" class="row-qty w-12 bg-transparent text-center outline-none font-black text-slate-800">
                </div>
                <div class="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-xl min-w-[150px]">
                    <span class="text-[9px] font-black text-slate-400">UNIT</span>
                    <input type="number" value="${price}" placeholder="0" class="row-price w-full bg-transparent text-right outline-none font-black text-blue-600">
                </div>
                <button onclick="this.parentElement.remove(); calculate();" class="p-2 text-slate-200 hover:text-red-500 transition-colors">
                    <i class="fas fa-times-circle"></i>
                </button>
            `;
            container.appendChild(div);
            div.querySelectorAll('input').forEach(i => i.oninput = calculate);
            calculate();
        };

        window.calculate = () => {
            let subtotal = 0;
            document.querySelectorAll('.row-item').forEach(row => {
                const q = parseFloat(row.querySelector('.row-qty').value) || 0;
                const p = parseFloat(row.querySelector('.row-price').value) || 0;
                subtotal += (q * p);
            });

            const total = (vatMode === 'exclude') ? Math.round(subtotal * 1.1) : subtotal;
            document.getElementById('display-total').innerText = total.toLocaleString() + '원';
            return { subtotal, total };
        };

        // --- 저장 및 히스토리 ---

        window.showSaveModal = () => {
            if(!document.getElementById('client-name').value) {
                alert('고객명을 먼저 입력해 주세요.');
                return;
            }
            document.getElementById('save-title').value = `[견적] ${document.getElementById('client-name').value}_${new Date().toLocaleDateString()}`;
            document.getElementById('save-modal').classList.remove('hidden');
        };

        window.closeSaveModal = () => document.getElementById('save-modal').classList.add('hidden');

        window.saveToCloud = async () => {
            if(!user) return;
            const btn = document.getElementById('save-confirm-btn');
            btn.disabled = true;
            btn.innerText = "저장 중...";

            const items = Array.from(document.querySelectorAll('.row-item')).map(r => ({
                name: r.querySelector('.row-name').value,
                qty: r.querySelector('.row-qty').value,
                price: r.querySelector('.row-price').value
            }));

            const data = {
                title: document.getElementById('save-title').value,
                client: document.getElementById('client-name').value,
                date: document.getElementById('doc-date').value,
                items: items,
                vatMode: vatMode,
                updatedAt: serverTimestamp()
            };

            try {
                if(currentDocId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'estimates', currentDocId), data);
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'estimates'), data);
                }
                closeSaveModal();
                alert('성공적으로 저장되었습니다.');
            } catch (e) {
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerText = "저장하기";
            }
        };

        function loadHistory() {
            if(!user) return;
            const qRef = query(collection(db, 'artifacts', appId, 'users', user.uid, 'estimates'));
            onSnapshot(qRef, (snap) => {
                const list = document.getElementById('history-list');
                list.innerHTML = '';
                if(snap.empty) {
                    list.innerHTML = '<div class="text-center py-12 text-slate-300 font-medium italic">저장된 내역이 없습니다.</div>';
                    return;
                }
                snap.forEach(d => {
                    const item = d.data();
                    const el = document.createElement('div');
                    el.className = "group bg-slate-50 hover:bg-white border border-slate-100 hover:border-blue-400 p-4 rounded-2xl cursor-pointer transition-all flex justify-between items-center";
                    el.onclick = () => {
                        currentDocId = d.id;
                        document.getElementById('client-name').value = item.client;
                        document.getElementById('doc-date').value = item.date;
                        setVat(item.vatMode);
                        document.getElementById('items-container').innerHTML = '';
                        item.items.forEach(it => addRow(it.name, it.qty, it.price));
                    };
                    el.innerHTML = `
                        <div class="truncate pr-2">
                            <div class="font-black text-sm text-slate-800 truncate">${item.title}</div>
                            <div class="text-[10px] font-bold text-slate-400 mt-0.5 uppercase tracking-tighter">${item.date}</div>
                        </div>
                        <button onclick="event.stopPropagation(); deleteDoc(doc(db, 'artifacts', '${appId}', 'users', '${user.uid}', 'estimates', '${d.id}'))" class="opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-red-500 transition-all">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    `;
                    list.appendChild(el);
                });
            });
        }

        // --- 발행(인쇄) 로직 ---

        window.handlePrint = () => {
            const { subtotal, total } = calculate();
            const client = document.getElementById('client-name').value || "귀하";
            const date = document.getElementById('doc-date').value;
            const vat = total - subtotal;
            const items = Array.from(document.querySelectorAll('.row-item')).map(r => {
                const p = parseFloat(r.querySelector('.row-price').value) || 0;
                // 세금 포함 시에는 역산하여 공급가 표시
                const unitPrice = (vatMode === 'exclude') ? p : Math.round(p / 1.1);
                const q = parseFloat(r.querySelector('.row-qty').value) || 0;
                return {
                    name: r.querySelector('.row-name').value || '항목 없음',
                    qty: q,
                    price: unitPrice,
                    sum: unitPrice * q
                };
            });

            const template = `
                <div style="width:210mm; min-height:297mm; padding:25mm 20mm; background:white; font-family:'Noto Sans KR'; color:#333; line-height:1.5;">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:60px;">
                        <h1 style="font-size:50px; font-weight:900; letter-spacing:12px; margin:0; border-bottom:8px solid #2563eb; padding-bottom:10px;">견적서</h1>
                        <div style="text-align:right;">
                            <div style="font-size:12px; color:#94a3b8; font-weight:700;">DOCUMENT NO: MS-${Date.now().toString().slice(-6)}</div>
                            <div style="font-size:18px; font-weight:900; margin-top:5px;">발행일: ${date}</div>
                        </div>
                    </div>

                    <div style="display:flex; justify-content:space-between; margin-bottom:50px; gap:40px;">
                        <div style="flex:1;">
                            <div style="font-size:26px; font-weight:900; border-bottom:3px solid #333; padding-bottom:10px; margin-bottom:15px;">${client} 貴下</div>
                            <p style="font-size:14px; color:#64748b; font-weight:500;">하기와 같이 프로젝트 견적 내용을 제출하오니,<br>검토 후 승인하여 주시기 바랍니다.</p>
                        </div>
                        <div style="width:360px;">
                            <table style="width:100%; border-collapse:collapse; font-size:12px; border:1px solid #333;">
                                <tr>
                                    <td rowspan="4" style="width:25px; background:#f1f5f9; text-align:center; font-weight:bold; border-right:1px solid #333;">공<br>급<br>자</td>
                                    <td style="padding:6px; background:#f8fafc; border-bottom:1px solid #ddd; width:70px; font-weight:bold;">등록번호</td>
                                    <td colspan="3" style="padding:6px; border-bottom:1px solid #ddd; font-weight:bold;">322-15-02616</td>
                                </tr>
                                <tr>
                                    <td style="padding:6px; background:#f8fafc; border-bottom:1px solid #ddd; font-weight:bold;">상호</td>
                                    <td style="padding:6px; border-bottom:1px solid #ddd; font-weight:bold;">메이스튜디오</td>
                                    <td style="padding:6px; background:#f8fafc; border-bottom:1px solid #ddd; width:40px; font-weight:bold;">성명</td>
                                    <td style="padding:6px; border-bottom:1px solid #ddd; text-align:center;">정윤희 (인)</td>
                                </tr>
                                <tr>
                                    <td style="padding:6px; background:#f8fafc; border-bottom:1px solid #ddd; font-weight:bold;">사업장</td>
                                    <td colspan="3" style="padding:6px; border-bottom:1px solid #ddd; font-size:11px;">창원시 성산구 중앙대로 33 대흥인터빌 519호</td>
                                </tr>
                                <tr>
                                    <td style="padding:6px; background:#f8fafc; font-weight:bold;">연락처</td>
                                    <td colspan="3" style="padding:6px; font-weight:bold;">010-3560-5859 / contact@maystudio.kr</td>
                                </tr>
                            </table>
                        </div>
                    </div>

                    <table style="width:100%; border-collapse:collapse; border-top:2px solid #333; margin-bottom:30px;">
                        <thead>
                            <tr style="background:#f8fafc; font-size:13px; font-weight:bold; color:#1e293b;">
                                <th style="border-bottom:1px solid #333; padding:15px; text-align:left;">과업 내용 및 품명</th>
                                <th style="border-bottom:1px solid #333; padding:15px; width:60px; text-align:center;">수량</th>
                                <th style="border-bottom:1px solid #333; padding:15px; width:100px; text-align:right;">단가</th>
                                <th style="border-bottom:1px solid #333; padding:15px; width:120px; text-align:right;">합계</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${items.map(i => `
                                <tr style="font-size:13px; border-bottom:1px solid #e2e8f0;">
                                    <td style="padding:15px; font-weight:600;">${i.name}</td>
                                    <td style="padding:15px; text-align:center;">${i.qty}</td>
