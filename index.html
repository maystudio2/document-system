<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MayStudio Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app">
        <!-- 로딩 스피너 -->
        <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-50">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        </div>

        <!-- 로그인 섹션 -->
        <div id="login-section" class="hidden min-h-screen flex items-center justify-center p-4">
            <div class="max-w-md w-full glass-morphism p-8 rounded-2xl shadow-xl">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-slate-800">MayStudio</h1>
                    <p class="text-slate-500 mt-2">관리자 계정으로 로그인하세요</p>
                </div>
                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">이메일</label>
                        <input type="email" id="email" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="contact@maystudio.kr" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">비밀번호</label>
                        <input type="password" id="password" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••" required>
                    </div>
                    <button type="submit" id="login-submit-btn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                        로그인
                    </button>
                </form>
                <div id="login-error" class="mt-4 text-red-500 text-sm text-center hidden"></div>
            </div>
        </div>

        <!-- 메인 대시보드 섹션 -->
        <div id="dashboard-section" class="hidden min-h-screen">
            <!-- 네비게이션 바 -->
            <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-40">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-600 text-white p-2 rounded-lg">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <span class="text-xl font-bold text-slate-800">MayStudio Admin</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="user-display" class="text-sm text-slate-600 hidden md:inline"></span>
                    <button id="logout-btn" class="px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition">
                        로그아웃 <i class="fas fa-sign-out-alt ml-1"></i>
                    </button>
                </div>
            </nav>

            <main class="max-w-6xl mx-auto p-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                        <p class="text-slate-500 text-sm">등록된 프로젝트</p>
                        <h3 class="text-2xl font-bold text-slate-800 mt-1" id="project-count">0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                        <p class="text-slate-500 text-sm">최근 접속</p>
                        <h3 class="text-2xl font-bold text-slate-800 mt-1" id="last-access-time">-</h3>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                        <p class="text-slate-500 text-sm">시스템 상태</p>
                        <h3 class="text-2xl font-bold text-green-500 mt-1">정상</h3>
                    </div>
                </div>

                <!-- 메모/메모장 기능 -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                        <h2 class="font-bold text-lg text-slate-800">관리자 메모</h2>
                        <button id="add-note-btn" class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-md text-sm font-medium hover:bg-blue-100">
                            새 메모 추가
                        </button>
                    </div>
                    <div id="notes-container" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- 메모 아이템이 여기에 렌더링됨 -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 설정
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'maystudio-admin';

        // DOM 요소
        const loadingScreen = document.getElementById('loading');
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const loginSubmitBtn = document.getElementById('login-submit-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userDisplay = document.getElementById('user-display');
        const notesContainer = document.getElementById('notes-container');
        const projectCountEl = document.getElementById('project-count');

        // 초기 인증 처리
        const initApp = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                }
            } catch (err) {
                console.error("Auth Init Error:", err);
            }
        };

        initApp();

        // 인증 상태 리스너
        onAuthStateChanged(auth, (user) => {
            loadingScreen.classList.add('hidden');
            if (user) {
                // 지정된 계정만 허용
                if (user.email === 'contact@maystudio.kr') {
                    showDashboard(user);
                } else {
                    // 비인가 계정 접근 시 로그아웃
                    signOut(auth);
                }
            } else {
                showLogin();
            }
        });

        function showLogin() {
            loginSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
            loginSubmitBtn.disabled = false;
            loginSubmitBtn.innerText = "로그인";
        }

        function showDashboard(user) {
            loginSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            userDisplay.textContent = user.email;
            document.getElementById('last-access-time').textContent = new Date().toLocaleTimeString();
            loadNotes(user.uid);
        }

        // 로그인 핸들러
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            loginError.classList.add('hidden');
            
            // 1차 필터링: 지정된 정보 확인
            if (email !== 'contact@maystudio.kr' || password !== 'maystudio@!') {
                loginError.textContent = "로그인 정보가 일치하지 않습니다.";
                loginError.classList.remove('hidden');
                return;
            }

            try {
                loginSubmitBtn.disabled = true;
                loginSubmitBtn.innerText = "인증 중...";
                
                // Firebase Auth 로그인 시도
                await signInWithEmailAndPassword(auth, email, password);
                
            } catch (err) {
                // Firebase에 계정이 없거나 인증 실패 시 동일한 메시지 출력
                loginError.textContent = "로그인 정보가 일치하지 않습니다.";
                loginError.classList.remove('hidden');
                loginSubmitBtn.disabled = false;
                loginSubmitBtn.innerText = "로그인";
                console.error("Firebase Auth Error:", err.code); 
            }
        });

        // 로그아웃 핸들러
        logoutBtn.addEventListener('click', () => signOut(auth));

        // Firestore 데이터 로드 (RULE 1 & 2 준수)
        function loadNotes(uid) {
            const notesCol = collection(db, 'artifacts', appId, 'public', 'data', 'notes');
            
            onSnapshot(notesCol, (snapshot) => {
                notesContainer.innerHTML = '';
                projectCountEl.textContent = snapshot.size;
                
                if (snapshot.empty) {
                    notesContainer.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400">등록된 메모가 없습니다.</div>`;
                    return;
                }

                snapshot.docs.forEach(docSnap => {
                    const data = docSnap.data();
                    const card = document.createElement('div');
                    card.className = "p-4 border border-slate-100 rounded-lg bg-slate-50 flex justify-between items-start";
                    card.innerHTML = `
                        <div>
                            <p class="font-medium text-slate-800">${data.content}</p>
                            <span class="text-xs text-slate-400">${data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString() : '방금 전'}</span>
                        </div>
                        <button onclick="deleteNote('${docSnap.id}')" class="text-slate-300 hover:text-red-500 transition">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    `;
                    notesContainer.appendChild(card);
                });
            }, (error) => {
                console.error("Firestore Error:", error);
            });
        }

        // 메모 추가
        document.getElementById('add-note-btn').addEventListener('click', async () => {
            const content = prompt("추가할 메모 내용을 입력하세요:");
            if (!content || !auth.currentUser) return;

            try {
                const notesCol = collection(db, 'artifacts', appId, 'public', 'data', 'notes');
                await addDoc(notesCol, {
                    content: content,
                    createdAt: serverTimestamp(),
                    author: auth.currentUser.uid
                });
            } catch (err) {
                console.error("Add Note Error:", err);
            }
        });

        // 메모 삭제
        window.deleteNote = async (id) => {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            try {
                const noteDoc = doc(db, 'artifacts', appId, 'public', 'data', 'notes', id);
                await deleteDoc(noteDoc);
            } catch (err) {
                console.error("Delete Error:", err);
            }
        };

    </script>
</body>
</html>
