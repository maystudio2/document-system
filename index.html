<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이스튜디오 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.025em; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        @media print {
            .no-print { display: none !important; }
            #print-area { display: block !important; }
            body { background: white !important; padding: 0 !important; }
            @page { size: A4; margin: 0; }
        }
        #print-area { display: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">
    <div id="app">
        <!-- 로딩 스크린 -->
        <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-[100]">
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 font-bold text-slate-400">데이터를 동기화하고 있습니다...</p>
            </div>
        </div>

        <!-- 로그인 섹션 -->
        <div id="login-section" class="hidden min-h-screen flex items-center justify-center p-6 no-print">
            <div class="max-w-md w-full bg-white p-10 rounded-[40px] shadow-2xl border border-slate-100">
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 text-white rounded-2xl shadow-lg mb-6">
                        <i class="fas fa-shield-alt text-2xl"></i>
                    </div>
                    <h1 class="text-3xl font-black text-slate-900">MayStudio</h1>
                    <p class="text-slate-400 mt-2 font-medium">관리자 보안 로그인이 필요합니다.</p>
                </div>
                <form id="login-form" class="space-y-4">
                    <input type="email" id="email" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 font-medium transition-all" placeholder="이메일 주소" required>
                    <input type="password" id="password" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 font-medium transition-all" placeholder="비밀번호" required>
                    <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-blue-600 transform active:scale-[0.98] transition-all shadow-xl">
                        접속하기
                    </button>
                </form>
                <div id="login-error" class="mt-6 p-4 bg-red-50 text-red-500 text-sm text-center rounded-xl font-bold hidden"></div>
            </div>
        </div>

        <!-- 메인 대시보드 -->
        <div id="dashboard-section" class="hidden min-h-screen no-print">
            <!-- 상단 헤더 -->
            <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-4 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="bg-slate-900 text-white w-10 h-10 flex items-center justify-center rounded-xl font-black">M</div>
                    <h2 class="text-xl font-black tracking-tight">MayStudio <span class="text-blue-600">Portal</span></h2>
                </div>
                <div class="flex items-center gap-3">
                    <span id="user-info" class="text-sm font-bold text-slate-500 mr-2"></span>
                    <button id="logout-btn" class="flex items-center gap-2 px-4 py-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all font-bold">
                        <i class="fas fa-power-off"></i> 로그아웃
                    </button>
                </div>
            </header>

            <div class="max-w-[1600px] mx-auto p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- 메인 작업 영역 -->
                <div class="lg:col-span-8 space-y-6">
                    <div class="bg-white rounded-[32px] shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-8 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h3 class="text-2xl font-black text-slate-800">문서 생성기</h3>
                                <p class="text-slate-400 font-medium text-sm">견적서 및 명세서를 관리합니다.</p>
                            </div>
                            <div class="flex bg-slate-100 p-1.5 rounded-2xl">
                                <button onclick="setVatMode('exclude')" id="vat-ex-btn" class="px-5 py-2.5 rounded-xl text-sm font-black transition-all">VAT 별도</button>
                                <button onclick="setVatMode('include')" id="vat-in-btn" class="px-5 py-2.5 rounded-xl text-sm font-black transition-all">VAT 포함</button>
                            </div>
                        </div>

                        <div class="p-8 space-y-8">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div class="md:col-span-2">
                                    <label class="block text-xs font-black text-slate-400 uppercase mb-2 ml-1">클라이언트 명칭</label>
                                    <input type="text" id="client-name" placeholder="예: (주)에이비씨" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                                </div>
                                <div>
                                    <label class="block text-xs font-black text-slate-400 uppercase mb-2 ml-1">발행 일자</label>
                                    <input type="date" id="doc-date" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                                </div>
                            </div>

                            <div class="space-y-4">
                                <div class="flex justify-between items-center px-1">
                                    <h4 class="font-black text-slate-800 flex items-center gap-2">
                                        <i class="fas fa-list-ul text-blue-600"></i> 품목 리스트
                                    </h4>
                                    <button onclick="addItemRow()" class="text-sm font-black text-blue-600 hover:underline">+ 항목 추가</button>
                                </div>
                                <div id="items-list" class="space-y-3"></div>
                            </div>
                        </div>

                        <div class="bg-slate-900 p-8 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div class="text-center md:text-left">
                                <span class="text-blue-400 font-black text-xs uppercase tracking-widest">Total Amount</span>
                                <div id="total-amount" class="text-4xl font-black text-white tracking-tighter">0원</div>
                            </div>
                            <div class="flex gap-3 w-full md:w-auto">
                                <button onclick="prepareSave()" class="flex-1 md:flex-none px-8 py-4 bg-white/10 text-white rounded-2xl font-black hover:bg-white/20 transition-all">
                                    <i class="fas fa-save mr-2"></i> 클라우드 저장
                                </button>
                                <button onclick="startPrint()" class="flex-1 md:flex-none px-10 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg hover:bg-blue-500 hover:-translate-y-1 transition-all">
                                    <i class="fas fa-print mr-2"></i> 견적서 발행
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 보관함 및 메모 -->
                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-white rounded-[32px] shadow-sm border border-slate-200 p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-black text-lg flex items-center gap-2">
                                <i class="fas fa-archive text-blue-600"></i> 보관함 (Repository)
                            </h3>
                            <button onclick="resetForm()" class="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-lg text-slate-400 hover:text-blue-600">
                                <i class="fas fa-sync-alt text-xs"></i>
                            </button>
                        </div>
                        <div id="repo-list" class="space-y-3 max-h-[450px] overflow-y-auto pr-2 custom-scrollbar">
                            <div class="text-center py-10 text-slate-300 font-bold">데이터를 불러오는 중...</div>
                        </div>
                    </div>

                    <div class="bg-blue-600 rounded-[32px] p-6 text-white shadow-xl">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-black flex items-center gap-2"><i class="fas fa-sticky-note"></i> 업무 메모</h3>
                            <button onclick="addMemo()" class="w-8 h-8 flex items-center justify-center bg-white/20 rounded-lg hover:bg-white/30">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                        <div id="memo-list" class="space-y-2 text-sm font-medium"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 저장 제목 입력 모달 -->
    <div id="save-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-8 shadow-2xl">
            <h4 class="text-xl font-black mb-2">보관함 저장</h4>
            <p class="text-slate-400 text-sm font-medium mb-6">보관함에 표시될 제목을 지정하세요.</p>
            <input type="text" id="save-title" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold mb-6" placeholder="예: [견적] 홍길동 프로젝트">
            <div class="flex gap-3">
                <button onclick="closeSaveModal()" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-black">취소</button>
                <button onclick="confirmSave()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black">저장 완료</button>
            </div>
        </div>
    </div>

    <!-- 인쇄 출력 영역 -->
    <div id="print-area"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'maystudio-enterprise-v2';

        const PROVIDER_INFO = {
            bizNo: "322-15-02616",
            name: "메이스튜디오",
            ceo: "정윤희",
            address: "창원시 성산구 중앙대로 33 대흥인터빌 519호",
            tel: "010-3560-5859",
            email: "contact@maystudio.kr",
            bank: "농협 302-1456-7890-11 (정윤희)"
        };

        let currentUser = null;
        let vatMode = 'exclude';
        let editingDocId = null;

        // 인증 초기화 (Rule 3 준수)
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error("Auth failed", e); }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            document.getElementById('loading').classList.add('hidden');
            currentUser = user;
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                document.getElementById('user-info').innerText = user.isAnonymous ? "익명 접속" : user.email;
                startSystem();
            } else {
                document.getElementById('login-section').classList.remove('hidden');
            }
        });

        function startSystem() {
            document.getElementById('doc-date').value = new Date().toISOString().split('T')[0];
            addItemRow();
            setVatMode('exclude');
            loadRepository();
            loadMemos();
        }

        window.setVatMode = (mode) => {
            vatMode = mode;
            document.getElementById('vat-ex-btn').className = mode === 'exclude' ? "px-5 py-2.5 rounded-xl text-sm font-black bg-white shadow-sm text-blue-600" : "px-5 py-2.5 rounded-xl text-sm font-black text-slate-400 hover:text-slate-600";
            document.getElementById('vat-in-btn').className = mode === 'include' ? "px-5 py-2.5 rounded-xl text-sm font-black bg-white shadow-sm text-blue-600" : "px-5 py-2.5 rounded-xl text-sm font-black text-slate-400 hover:text-slate-600";
            calculateTotal();
        };

        window.addItemRow = (name = "", qty = 1, price = "") => {
            const container = document.getElementById('items-list');
            const row = document.createElement('div');
            row.className = "item-row flex flex-wrap md:flex-nowrap gap-3 p-4 bg-slate-50 border border-slate-100 rounded-2xl items-center hover:bg-white hover:border-blue-200 transition-all";
            row.innerHTML = `
                <div class="flex-grow min-w-[200px]">
                    <input type="text" value="${name}" placeholder="과업 명칭" class="item-name w-full bg-transparent outline-none font-bold text-slate-700">
                </div>
                <div class="w-20">
                    <input type="number" value="${qty}" placeholder="수량" class="item-qty w-full bg-transparent text-center outline-none font-bold">
                </div>
                <div class="w-32">
                    <input type="number" value="${price}" placeholder="단가" class="item-price w-full bg-transparent text-right outline-none font-bold text-blue-600">
                </div>
                <button onclick="this.parentElement.remove(); calculateTotal();" class="text-slate-300 hover:text-red-500 px-2">
                    <i class="fas fa-times"></i>
                </button>
            `;
            container.appendChild(row);
            row.querySelectorAll('input').forEach(i => i.addEventListener('input', calculateTotal));
            calculateTotal();
        };

        window.calculateTotal = () => {
            let subtotal = 0;
            document.querySelectorAll('.item-row').forEach(row => {
                const q = parseFloat(row.querySelector('.item-qty').value) || 0;
                const p = parseFloat(row.querySelector('.item-price').value) || 0;
                subtotal += (q * p);
            });
            let final = (vatMode === 'exclude') ? Math.round(subtotal * 1.1) : subtotal;
            document.getElementById('total-amount').innerText = final.toLocaleString() + '원';
            return { subtotal, final };
        };

        window.prepareSave = () => {
            const client = document.getElementById('client-name').value;
            if(!client) return alert('클라이언트를 입력해주세요.');
            document.getElementById('save-title').value = client;
            document.getElementById('save-modal').classList.remove('hidden');
        };

        window.closeSaveModal = () => document.getElementById('save-modal').classList.add('hidden');

        window.confirmSave = async () => {
            if(!currentUser) return;
            const title = document.getElementById('save-title').value;
            const client = document.getElementById('client-name').value;
            const date = document.getElementById('doc-date').value;
            const total = document.getElementById('total-amount').innerText;
            const items = Array.from(document.querySelectorAll('.item-row')).map(row => ({
                name: row.querySelector('.item-name').value,
                qty: row.querySelector('.item-qty').value,
                price: row.querySelector('.item-price').value
            }));

            const data = { saveTitle: title, client, date, vatMode, items, total, updatedAt: serverTimestamp() };
            const path = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'repository');
            
            try {
                if(editingDocId) await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'repository', editingDocId), data);
                else await addDoc(path, data);
                closeSaveModal();
                alert('저장되었습니다.');
            } catch(e) { console.error(e); }
        };

        function loadRepository() {
            if(!currentUser) return;
            const path = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'repository');
            onSnapshot(path, (snap) => {
                const list = document.getElementById('repo-list');
                list.innerHTML = '';
                if(snap.empty) { list.innerHTML = '<div class="text-center py-10 text-slate-300 font-bold">비어 있음</div>'; return; }
                snap.forEach(d => {
                    const data = d.data();
                    const el = document.createElement('div');
                    el.className = "group p-4 bg-slate-50 border border-slate-100 rounded-2xl cursor-pointer hover:border-blue-400 hover:bg-white transition-all flex justify-between items-center";
                    el.onclick = () => {
                        editingDocId = d.id;
                        document.getElementById('client-name').value = data.client;
                        document.getElementById('doc-date').value = data.date;
                        setVatMode(data.vatMode);
                        document.getElementById('items-list').innerHTML = '';
                        data.items.forEach(it => addItemRow(it.name, it.qty, it.price));
                    };
                    el.innerHTML = `
                        <div class="truncate"><h5 class="font-black text-slate-800 text-sm truncate">${data.saveTitle || data.client}</h5><p class="text-[10px] font-bold text-slate-400">${data.date} | ${data.total}</p></div>
                        <button onclick="event.stopPropagation(); deleteDoc(doc(db, 'artifacts', '${appId}', 'users', '${currentUser.uid}', 'repository', '${d.id}'))" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100"><i class="fas fa-trash"></i></button>
                    `;
                    list.appendChild(el);
                });
            }, (e) => console.error(e));
        }

        window.addMemo = async () => {
            const txt = prompt('메모 입력:');
            if(txt) await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'memos'), { content: txt, createdAt: serverTimestamp() });
        };

        function loadMemos() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'memos'), (snap) => {
                const list = document.getElementById('memo-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const el = document.createElement('div');
                    el.className = "flex justify-between items-center bg-white/10 p-3 rounded-xl border border-white/5";
                    el.innerHTML = `<span>${d.data().content}</span><button onclick="deleteDoc(doc(db, 'artifacts', '${appId}', 'public', 'data', 'memos', '${d.id}'))" class="text-white/40"><i class="fas fa-times"></i></button>`;
                    list.appendChild(el);
                });
            });
        }

        window.startPrint = () => {
            const client = document.getElementById('client-name').value || "귀하";
            const dateStr = document.getElementById('doc-date').value;
            const { subtotal, final } = calculateTotal();
            const vat = final - subtotal;
            const rows = Array.from(document.querySelectorAll('.item-row')).map(row => {
                const n = row.querySelector('.item-name').value;
                const q = parseFloat(row.querySelector('.item-qty').value) || 0;
                const p = parseFloat(row.querySelector('.item-price').value) || 0;
                const sp = (vatMode === 'exclude') ? p : Math.round(p / 1.1);
                return { n, q, sp, amt: q * sp };
            });

            document.getElementById('print-area').innerHTML = `
                <div style="width:210mm; min-height:297mm; padding:20mm; background:white; margin:0 auto; font-family:'Noto Sans KR';">
                    <h1 style="text-align:center; font-size:48px; font-weight:900; letter-spacing:20px; text-decoration:underline; margin-bottom:50px;">견 적 서</h1>
                    <div style="display:flex; justify-content:space-between; margin-bottom:40px;">
                        <div><div style="font-size:26px; font-weight:bold; border-bottom:3px solid black;">${client} 님</div><div style="margin-top:10px;">${dateStr}</div></div>
                        <div style="width:350px;">
                            <table style="width:100%; border-collapse:collapse; border:1px solid black; font-size:12px;">
                                <tr><td rowspan="4" style="background:#eee; text-align:center; width:20px; font-weight:bold; border:1px solid black;">공<br>급<br>자</td><td style="border:1px solid black; padding:5px; background:#f9f9f9;">사업자번호</td><td colspan="3" style="border:1px solid black; padding:5px; font-weight:bold;">${PROVIDER_INFO.bizNo}</td></tr>
                                <tr><td style="border:1px solid black; padding:5px; background:#f9f9f9;">상호</td><td style="border:1px solid black; padding:5px; font-weight:bold;">${PROVIDER_INFO.name}</td><td style="border:1px solid black; padding:5px; background:#f9f9f9;">성명</td><td style="border:1px solid black; padding:5px;">${PROVIDER_INFO.ceo}</td></tr>
                                <tr><td style="border:1px solid black; padding:5px; background:#f9f9f9;">주소</td><td colspan="3" style="border:1px solid black; padding:5px; font-size:10px;">${PROVIDER_INFO.address}</td></tr>
                                <tr><td style="border:1px solid black; padding:5px; background:#f9f9f9;">연락처</td><td colspan="3" style="border:1px solid black; padding:5px;">${PROVIDER_INFO.tel} / ${PROVIDER_INFO.email}</td></tr>
                            </table>
                        </div>
                    </div>
                    <table style="width:100%; border-collapse:collapse; border:1px solid black; font-size:13px;">
                        <thead><tr style="background:#eee;">
                            <th style="border:1px solid black; padding:10px;">품명</th><th style="border:1px solid black;">수량</th><th style="border:1px solid black;">단가</th><th style="border:1px solid black;">금액</th><th style="border:1px solid black;">비고</th>
                        </tr></thead>
                        <tbody>
                            ${rows.map(r => `<tr><td style="border:1px solid black; padding:10px;">${r.n}</td><td style="border:1px solid black; text-align:center;">${r.q}</td><td style="border:1px solid black; text-align:right; padding-right:5px;">${r.sp.toLocaleString()}</td><td style="border:1px solid black; text-align:right; padding-right:5px; font-weight:bold;">${r.amt.toLocaleString()}</td><td style="border:1px solid black;"></td></tr>`).join('')}
                        </tbody>
                        <tfoot>
                            <tr><td colspan="3" style="border:1px solid black; text-align:right; padding:10px; background:#f9f9f9;">공급가액</td><td style="border:1px solid black; text-align:right; padding-right:5px;">${subtotal.toLocaleString()}</td><td style="border:1px solid black;"></td></tr>
                            <tr><td colspan="3" style="border:1px solid black; text-align:right; padding:10px; background:#f9f9f9;">부가세 (10%)</td><td style="border:1px solid black; text-align:right; padding-right:5px;">${vat.toLocaleString()}</td><td style="border:1px solid black;"></td></tr>
                            <tr style="background:#eee; font-size:18px;"><td colspan="3" style="border:1px solid black; text-align:right; padding:15px; font-weight:bold;">총 합 계</td><td style="border:1px solid black; text-align:right; padding-right:5px; font-weight:black; color:blue;">${final.toLocaleString()}원</td><td style="border:1px solid black;"></td></tr>
                        </tfoot>
                    </table>
                    <div style="margin-top:30px; padding:20px; border:1px solid #ccc; font-size:13px; line-height:1.8;">
                        <b>계좌 정보: ${PROVIDER_INFO.bank}</b><br>
                        * 견적 유효기간: 발행일로부터 30일<br>
                        * 입금 확인 후 최종 작업에 착수합니다.
                    </div>
                </div>
            `;
            window.print();
        };

        window.resetForm = () => location.reload();
        document.getElementById('logout-btn').onclick = () => signOut(auth);
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
            .catch(() => alert('로그인 실패'));
        };
    </script>
</body>
</html>
