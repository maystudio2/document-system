<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MayStudio Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        /* 로딩 화면 강제 숨김 방지 */
        #loading.hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app">
        <!-- 로딩 스피너 -->
        <div id="loading" class="fixed inset-0 flex flex-col items-center justify-center bg-white z-[100]">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <p class="text-slate-500 text-sm">시스템을 불러오는 중...</p>
        </div>

        <!-- 로그인 섹션 -->
        <div id="login-section" class="hidden min-h-screen flex items-center justify-center p-4">
            <div class="max-w-md w-full glass-morphism p-8 rounded-2xl shadow-xl border border-slate-200">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-black text-slate-800 tracking-tight">MayStudio</h1>
                    <p class="text-slate-500 mt-2 font-medium">관리자 전용 로그인</p>
                </div>
                <form id="login-form" class="space-y-5">
                    <div>
                        <label class="block text-[11px] font-black text-slate-400 uppercase tracking-wider mb-1">이메일 계정</label>
                        <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-100 outline-none transition font-medium" placeholder="contact@maystudio.kr" required>
                    </div>
                    <div>
                        <label class="block text-[11px] font-black text-slate-400 uppercase tracking-wider mb-1">비밀번호</label>
                        <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-100 outline-none transition font-medium" placeholder="••••••••" required>
                    </div>
                    <button type="submit" id="login-submit-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition shadow-xl active:scale-[0.98]">
                        로그인하기
                    </button>
                </form>
                <div id="login-error" class="mt-4 p-3 bg-red-50 text-red-500 text-xs text-center rounded-lg font-bold hidden"></div>
            </div>
        </div>

        <!-- 메인 대시보드 섹션 -->
        <div id="dashboard-section" class="hidden min-h-screen">
            <nav class="bg-white border-b border-slate-100 px-6 py-4 flex justify-between items-center sticky top-0 z-40 shadow-sm">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-600 text-white p-2 rounded-lg shadow-lg shadow-blue-200">
                        <i class="fas fa-layer-group text-sm"></i>
                    </div>
                    <span class="text-lg font-black text-slate-800 tracking-tight">MayStudio <span class="font-light text-slate-400 ml-1">Portal</span></span>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="hidden md:flex flex-col items-end mr-2">
                        <span id="user-display" class="text-xs font-bold text-slate-800"></span>
                        <span class="text-[10px] text-green-500 font-bold">● 접속중</span>
                    </div>
                    <button id="logout-btn" class="p-2.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition">
                        <i class="fas fa-sign-out-alt text-lg"></i>
                    </button>
                </div>
            </nav>

            <main class="max-w-6xl mx-auto p-6">
                <!-- 상단 통계 카드 -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div class="bg-white p-7 rounded-[24px] border border-slate-100 shadow-sm relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-5"><i class="fas fa-file-alt text-6xl"></i></div>
                        <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">총 관리 데이터</p>
                        <h3 class="text-3xl font-black text-slate-800 mt-1" id="project-count">0</h3>
                    </div>
                    <div class="bg-white p-7 rounded-[24px] border border-slate-100 shadow-sm">
                        <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">최근 로그인</p>
                        <h3 class="text-xl font-bold text-slate-800 mt-1" id="last-access-time">-</h3>
                    </div>
                    <div class="bg-white p-7 rounded-[24px] border border-blue-600 shadow-sm bg-blue-600 text-white">
                        <p class="text-[11px] font-black text-blue-200 uppercase tracking-widest mb-1">시스템 상태</p>
                        <h3 class="text-xl font-bold mt-1 flex items-center gap-2">
                            <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span> 정상 작동중
                        </h3>
                    </div>
                </div>

                <!-- 메모 섹션 -->
                <section class="bg-white rounded-[32px] border border-slate-100 shadow-sm overflow-hidden">
                    <div class="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                        <div>
                            <h2 class="font-black text-xl text-slate-800">관리자 전용 메모장</h2>
                            <p class="text-xs text-slate-400 font-medium mt-1">Firestore 실시간 클라우드 동기화</p>
                        </div>
                        <button id="add-note-btn" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100">
                            <i class="fas fa-plus mr-2"></i> 새 메모
                        </button>
                    </div>
                    <div id="notes-container" class="p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 min-h-[300px]">
                        <!-- 데이터 로딩 상태 -->
                        <div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-300">
                            <i class="fas fa-spinner animate-spin text-2xl mb-4"></i>
                            <p class="text-sm font-medium">데이터를 실시간으로 동기화하는 중입니다...</p>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 환경 변수 안전 처리 (Canvas 환경 지원)
        const getFirebaseConfig = () => {
            try { 
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    return JSON.parse(__firebase_config);
                }
            } catch (e) { console.error("Config Parse Error"); }
            // 기본값 (연결 실패 시 로컬 모드 유도용 빈 객체)
            return { apiKey: "NONE", authDomain: "", projectId: "local", storageBucket: "", messagingSenderId: "", appId: "" };
        };

        const config = getFirebaseConfig();
        let app, auth, db;
        
        try {
            app = initializeApp(config);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase Init Failed:", e);
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'maystudio-v2';
        const loadingScreen = document.getElementById('loading');
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const loginSubmitBtn = document.getElementById('login-submit-btn');
        const notesContainer = document.getElementById('notes-container');

        // 상태 관리 함수
        const hideLoading = () => {
            loadingScreen.classList.add('hidden');
            loadingScreen.style.display = 'none';
        };
        
        // 인증 상태 리스너
        if (auth) {
            onAuthStateChanged(auth, (user) => {
                hideLoading();
                if (user && user.email === 'contact@maystudio.kr') {
                    showDashboard(user);
                } else {
                    showLogin();
                }
            });
        } else {
            // Firebase가 초기화되지 못한 경우 즉시 로그인 화면으로
            setTimeout(hideLoading, 500);
            showLogin();
        }

        function showDashboard(user) {
            dashboardSection.classList.remove('hidden');
            loginSection.classList.add('hidden');
            document.getElementById('user-display').textContent = user.email;
            document.getElementById('last-access-time').textContent = new Date().toLocaleTimeString('ko-KR');
            loadNotes(user.uid);
        }

        function showLogin() {
            loginSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
        }

        // 로그인 처리
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            loginError.classList.add('hidden');
            
            if (email !== 'contact@maystudio.kr' || password !== 'maystudio@!') {
                loginError.textContent = "로그인 정보가 일치하지 않습니다.";
                loginError.classList.remove('hidden');
                return;
            }

            try {
                loginSubmitBtn.disabled = true;
                loginSubmitBtn.textContent = "인증 처리 중...";
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) {
                loginError.textContent = "로그인 정보가 일치하지 않습니다.";
                loginError.classList.remove('hidden');
                loginSubmitBtn.disabled = false;
                loginSubmitBtn.textContent = "로그인하기";
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        function loadNotes(uid) {
            if (!db) return;
            const notesCol = collection(db, 'artifacts', appId, 'public', 'data', 'admin_notes');
            
            onSnapshot(notesCol, (snapshot) => {
                notesContainer.innerHTML = '';
                document.getElementById('project-count').textContent = snapshot.size;
                
                if (snapshot.empty) {
                    notesContainer.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-20 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-100"><p class="text-slate-400 font-bold text-sm">보관된 메모가 없습니다.</p></div>`;
                    return;
                }

                snapshot.docs.forEach(docSnap => {
                    const data = docSnap.data();
                    const dateStr = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '방금 전';
                    const card = document.createElement('div');
                    card.className = "group p-6 bg-white border border-slate-100 rounded-[20px] shadow-sm hover:shadow-xl hover:border-blue-200 transition-all relative flex flex-col justify-between";
                    card.innerHTML = `<div><div class="w-8 h-1 bg-blue-100 rounded-full mb-4 group-hover:bg-blue-600 transition-colors"></div><p class="text-slate-700 font-bold leading-relaxed mb-4">${data.content}</p></div><div class="flex justify-between items-center mt-4 pt-4 border-t border-slate-50"><span class="text-[10px] font-black text-slate-300 uppercase">${dateStr}</span><button onclick="deleteNote('${docSnap.id}')" class="text-slate-200 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt text-xs"></i></button></div>`;
                    notesContainer.appendChild(card);
                });
            }, (error) => {
                notesContainer.innerHTML = `<p class="col-span-full text-center text-red-400 py-10 text-xs font-bold">데이터 로드 실패 (권한 없음)</p>`;
            });
        }

        document.getElementById('add-note-btn').addEventListener('click', async () => {
            const content = prompt("새로운 메모 내용을 입력하세요:");
            if (!content || !db) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'admin_notes'), {
                    content: content,
                    createdAt: serverTimestamp(),
                    author: auth.currentUser.uid
                });
            } catch (err) { alert("저장 실패"); }
        });

        window.deleteNote = async (id) => {
            if (!confirm('메모를 삭제하시겠습니까?') || !db) return;
            try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'admin_notes', id)); } catch (err) { alert("삭제 실패"); }
        };

        // 안전 장치: 2.5초 후에도 로딩이 안 사라지면 강제 실행 (Canvas 환경 대응)
        setTimeout(() => {
            if (!loadingScreen.classList.contains('hidden')) {
                console.log("Forcing load closure...");
                hideLoading();
                showLogin();
            }
        }, 2500);

    </script>
</body>
</html>
