<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MayStudio Integrated Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.025em; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        @media print {
            .no-print { display: none !important; }
            #print-area { display: block !important; }
            body { background: white !important; padding: 0 !important; }
            @page { size: A4; margin: 0; }
        }
        #print-area { display: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .input-focus:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">
    <div id="app">
        <!-- 로딩 스크린 -->
        <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-[100]">
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 font-bold text-slate-400">데이터를 동기화하고 있습니다...</p>
            </div>
        </div>

        <!-- 로그인 섹션 -->
        <div id="login-section" class="hidden min-h-screen flex items-center justify-center p-6 no-print">
            <div class="max-w-md w-full bg-white p-10 rounded-[40px] shadow-2xl border border-slate-100">
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 text-white rounded-2xl shadow-lg mb-6">
                        <i class="fas fa-shield-alt text-2xl"></i>
                    </div>
                    <h1 class="text-3xl font-black text-slate-900">MayStudio</h1>
                    <p class="text-slate-400 mt-2 font-medium">관리자 전용 보안 로그인이 필요합니다.</p>
                </div>
                <form id="login-form" class="space-y-4">
                    <input type="email" id="email" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none input-focus font-medium transition-all" placeholder="이메일 주소" required>
                    <input type="password" id="password" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none input-focus font-medium transition-all" placeholder="비밀번호" required>
                    <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-blue-600 transform active:scale-[0.98] transition-all shadow-xl">
                        접속하기
                    </button>
                </form>
                <div id="login-error" class="mt-6 p-4 bg-red-50 text-red-500 text-sm text-center rounded-xl font-bold hidden"></div>
            </div>
        </div>

        <!-- 메인 대시보드 -->
        <div id="dashboard-section" class="hidden min-h-screen no-print">
            <!-- 상단 헤더 -->
            <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-4 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="bg-slate-900 text-white w-10 h-10 flex items-center justify-center rounded-xl font-black">M</div>
                    <h2 class="text-xl font-black tracking-tight">MayStudio <span class="text-blue-600">Portal</span></h2>
                </div>
                <div class="flex items-center gap-3">
                    <span id="user-info" class="text-sm font-bold text-slate-500 mr-2"></span>
                    <button id="logout-btn" class="flex items-center gap-2 px-4 py-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all font-bold">
                        <i class="fas fa-power-off"></i> 로그아웃
                    </button>
                </div>
            </header>

            <div class="max-w-[1600px] mx-auto p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- 메인 작업 영역 (좌측 8) -->
                <div class="lg:col-span-8 space-y-6">
                    <div class="bg-white rounded-[32px] shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-8 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h3 class="text-2xl font-black text-slate-800">문서 생성기</h3>
                                <p class="text-slate-400 font-medium text-sm">견적서, 명세서, 영수증을 즉시 발행합니다.</p>
                            </div>
                            <div class="flex bg-slate-100 p-1.5 rounded-2xl">
                                <button onclick="setVatMode('exclude')" id="vat-ex-btn" class="px-5 py-2.5 rounded-xl text-sm font-black transition-all">VAT 별도</button>
                                <button onclick="setVatMode('include')" id="vat-in-btn" class="px-5 py-2.5 rounded-xl text-sm font-black transition-all">VAT 포함</button>
                            </div>
                        </div>

                        <div class="p-8 space-y-8">
                            <!-- 문서 정보 -->
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div class="md:col-span-2">
                                    <label class="block text-xs font-black text-slate-400 uppercase mb-2 ml-1">클라이언트 / 프로젝트명</label>
                                    <input type="text" id="client-name" placeholder="예: (주)에이비씨 - 브랜딩 디자인 건" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none input-focus font-bold">
                                </div>
                                <div>
                                    <label class="block text-xs font-black text-slate-400 uppercase mb-2 ml-1">발행 일자</label>
                                    <input type="date" id="doc-date" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none input-focus font-bold">
                                </div>
                            </div>

                            <!-- 품목 추가 -->
                            <div class="space-y-4">
                                <div class="flex justify-between items-center px-1">
                                    <h4 class="font-black text-slate-800 flex items-center gap-2">
                                        <i class="fas fa-list-ul text-blue-600"></i> 세부 품목 리스트
                                    </h4>
                                    <button onclick="addItemRow()" class="text-sm font-black text-blue-600 hover:underline">+ 항목 추가</button>
                                </div>
                                <div id="items-list" class="space-y-3">
                                    <!-- 항목 Row가 여기에 추가됨 -->
                                </div>
                            </div>
                        </div>

                        <!-- 합계 및 액션 패널 -->
                        <div class="bg-slate-900 p-8 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div class="text-center md:text-left">
                                <span class="text-blue-400 font-black text-xs uppercase tracking-widest">Grand Total</span>
                                <div id="total-amount" class="text-4xl font-black text-white tracking-tighter">0원</div>
                            </div>
                            <div class="flex gap-3 w-full md:w-auto">
                                <button onclick="prepareSave()" class="flex-1 md:flex-none px-8 py-4 bg-white/10 text-white rounded-2xl font-black hover:bg-white/20 transition-all">
                                    <i class="fas fa-save mr-2"></i> 클라우드 저장
                                </button>
                                <button onclick="startPrint()" class="flex-1 md:flex-none px-10 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg hover:bg-blue-500 hover:-translate-y-1 transition-all">
                                    <i class="fas fa-print mr-2"></i> 견적서 발행
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 보관함 및 유틸리티 (우측 4) -->
                <div class="lg:col-span-4 space-y-6">
                    <!-- 보관함 (Repository) -->
                    <div class="bg-white rounded-[32px] shadow-sm border border-slate-200 p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-black text-lg flex items-center gap-2">
                                <i class="fas fa-archive text-blue-600"></i> Repository
                            </h3>
                            <button onclick="resetForm()" class="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-lg text-slate-400 hover:text-blue-600">
                                <i class="fas fa-sync-alt text-xs"></i>
                            </button>
                        </div>
                        <div id="repo-list" class="space-y-3 max-h-[450px] overflow-y-auto pr-2 custom-scrollbar">
                            <!-- 저장된 문서 리스트 -->
                            <div class="text-center py-10 text-slate-300 font-bold">저장된 데이터가 없습니다.</div>
                        </div>
                    </div>

                    <!-- 관리자 메모 -->
                    <div class="bg-blue-600 rounded-[32px] p-6 text-white shadow-xl">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-black flex items-center gap-2"><i class="fas fa-sticky-note"></i> 업무 메모</h3>
                            <button onclick="addMemo()" class="w-8 h-8 flex items-center justify-center bg-white/20 rounded-lg hover:bg-white/30">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                        <div id="memo-list" class="space-y-2 text-sm font-medium">
                            <!-- 메모 리스트 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 저장 시 제목 입력 모달 -->
    <div id="save-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-8 shadow-2xl">
            <h4 class="text-xl font-black mb-2">보관함 저장</h4>
            <p class="text-slate-400 text-sm font-medium mb-6">저장될 문서의 제목을 지정해주세요.</p>
            <input type="text" id="save-title" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus font-bold mb-6" placeholder="예: [견적] 신규 프로젝트">
            <div class="flex gap-3">
                <button onclick="closeSaveModal()" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-black">취소</button>
                <button onclick="confirmSave()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black">저장 완료</button>
            </div>
        </div>
    </div>

    <!-- 인쇄 출력물 (A4) -->
    <div id="print-area"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, serverTimestamp, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'maystudio-enterprise-v2';

        const PROVIDER_INFO = {
            bizNo: "322-15-02616",
            name: "메이스튜디오",
            ceo: "정윤희",
            address: "창원시 성산구 중앙대로 33 대흥인터빌 519호",
            tel: "010-3560-5859",
            email: "contact@maystudio.kr",
            bank: "농협 302-1456-7890-11 (정윤희)"
        };

        let user = null;
        let vatMode = 'exclude'; // 'exclude' (별도), 'include' (포함)
        let editingDocId = null;

        // 시스템 시작
        onAuthStateChanged(auth, (u) => {
            document.getElementById('loading').classList.add('hidden');
            user = u;
            if (u) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                document.getElementById('user-info').innerText = u.email;
                initDashboard();
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('dashboard-section').classList.add('hidden');
            }
        });

        // 초기 화면 설정
        function initDashboard() {
            document.getElementById('doc-date').value = new Date().toISOString().split('T')[0];
            addItemRow();
            setVatMode('exclude');
            syncRepository();
            syncMemos();
        }

        // VAT 모드 전환
        window.setVatMode = (mode) => {
            vatMode = mode;
            const exBtn = document.getElementById('vat-ex-btn');
            const inBtn = document.getElementById('vat-in-btn');
            
            if(mode === 'exclude') {
                exBtn.className = "px-5 py-2.5 rounded-xl text-sm font-black bg-white shadow-sm text-blue-600";
                inBtn.className = "px-5 py-2.5 rounded-xl text-sm font-black text-slate-400 hover:text-slate-600";
            } else {
                inBtn.className = "px-5 py-2.5 rounded-xl text-sm font-black bg-white shadow-sm text-blue-600";
                exBtn.className = "px-5 py-2.5 rounded-xl text-sm font-black text-slate-400 hover:text-slate-600";
            }
            calculateTotal();
        };

        // 품목 행 추가
        window.addItemRow = (name = "", qty = 1, price = "") => {
            const container = document.getElementById('items-list');
            const row = document.createElement('div');
            row.className = "item-row flex flex-wrap md:flex-nowrap gap-3 p-4 bg-slate-50 border border-slate-100 rounded-2xl items-center hover:bg-white hover:border-blue-200 transition-all group";
            row.innerHTML = `
                <div class="flex-grow min-w-[200px]">
                    <input type="text" value="${name}" placeholder="과업 품명 (예: 브랜드 아이덴티티 구축)" class="item-name w-full bg-transparent outline-none font-bold text-slate-700">
                </div>
                <div class="w-20">
                    <input type="number" value="${qty}" placeholder="수량" class="item-qty w-full bg-transparent text-center outline-none border-b border-transparent focus:border-blue-500 font-bold">
                </div>
                <div class="w-32">
                    <input type="number" value="${price}" placeholder="단가" class="item-price w-full bg-transparent text-right outline-none font-bold text-blue-600">
                </div>
                <button onclick="this.parentElement.remove(); calculateTotal();" class="text-slate-300 hover:text-red-500 px-2">
                    <i class="fas fa-times"></i>
                </button>
            `;
            container.appendChild(row);
            row.querySelectorAll('input').forEach(input => input.addEventListener('input', calculateTotal));
            calculateTotal();
        };

        // 합계 계산
        window.calculateTotal = () => {
            let subtotal = 0;
            document.querySelectorAll('.item-row').forEach(row => {
                const q = parseFloat(row.querySelector('.item-qty').value) || 0;
                const p = parseFloat(row.querySelector('.item-price').value) || 0;
                subtotal += (q * p);
            });

            let finalTotal = (vatMode === 'exclude') ? Math.round(subtotal * 1.1) : subtotal;
            document.getElementById('total-amount').innerText = finalTotal.toLocaleString() + '원';
            return { subtotal, finalTotal };
        };

        // 저장 절차
        window.prepareSave = () => {
            const client = document.getElementById('client-name').value;
            if(!client) return alert('클라이언트 또는 프로젝트명을 입력해주세요.');
            document.getElementById('save-title').value = client;
            document.getElementById('save-modal').classList.remove('hidden');
        };

        window.closeSaveModal = () => document.getElementById('save-modal').classList.add('hidden');

        window.confirmSave = async () => {
            if(!user) return;
            const title = document.getElementById('save-title').value;
            const client = document.getElementById('client-name').value;
            const date = document.getElementById('doc-date').value;
            const total = document.getElementById('total-amount').innerText;
            
            const items = [];
            document.querySelectorAll('.item-row').forEach(row => {
                items.push({
                    name: row.querySelector('.item-name').value,
                    qty: row.querySelector('.item-qty').value,
                    price: row.querySelector('.item-price').value
                });
            });

            const docData = {
                saveTitle: title,
                client,
                date,
                vatMode,
                items,
                total,
                updatedAt: serverTimestamp()
            };

            try {
                if(editingDocId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'repository', editingDocId), docData);
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'repository'), docData);
                }
                closeSaveModal();
                alert('보관함에 성공적으로 저장되었습니다.');
            } catch(e) { console.error(e); }
        };

        // 보관함 동기화
        function syncRepository() {
            const qRef = collection(db, 'artifacts', appId, 'users', user.uid, 'repository');
            onSnapshot(qRef, (snap) => {
                const list = document.getElementById('repo-list');
                list.innerHTML = '';
                if(snap.empty) {
                    list.innerHTML = '<div class="text-center py-10 text-slate-300 font-bold">저장된 데이터가 없습니다.</div>';
                    return;
                }
                snap.forEach(d => {
                    const data = d.data();
                    const item = document.createElement('div');
                    item.className = "group p-4 bg-slate-50 border border-slate-100 rounded-2xl cursor-pointer hover:border-blue-400 hover:bg-white transition-all flex justify-between items-center shadow-sm hover:shadow-md";
                    item.onclick = () => loadRepo(d.id, data);
                    item.innerHTML = `
                        <div class="truncate">
                            <h5 class="font-black text-slate-800 text-sm truncate">${data.saveTitle || data.client}</h5>
                            <p class="text-[10px] font-bold text-slate-400 mt-1">${data.date} | <span class="text-blue-500">${data.total}</span></p>
                        </div>
                        <button onclick="deleteRepo(event, '${d.id}')" class="opacity-0 group-hover:opacity-100 w-8 h-8 flex items-center justify-center text-slate-300 hover:text-red-500 transition-all">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    `;
                    list.appendChild(item);
                });
            });
        }

        window.loadRepo = (id, data) => {
            editingDocId = id;
            document.getElementById('client-name').value = data.client;
            document.getElementById('doc-date').value = data.date;
            setVatMode(data.vatMode);
            const container = document.getElementById('items-list');
            container.innerHTML = '';
            data.items.forEach(it => addItemRow(it.name, it.qty, it.price));
            calculateTotal();
        };

        window.deleteRepo = async (e, id) => {
            e.stopPropagation();
            if(!confirm('해당 기록을 삭제하시겠습니까?')) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'repository', id));
            if(editingDocId === id) resetForm();
        };

        window.resetForm = () => {
            editingDocId = null;
            document.getElementById('client-name').value = '';
            document.getElementById('items-list').innerHTML = '';
            addItemRow();
            calculateTotal();
        };

        // 메모 기능
        function syncMemos() {
            const qRef = collection(db, 'artifacts', appId, 'public', 'data', 'internal_memos');
            onSnapshot(qRef, (snap) => {
                const list = document.getElementById('memo-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data();
                    const item = document.createElement('div');
                    item.className = "flex justify-between items-center bg-white/10 p-3 rounded-xl border border-white/5";
                    item.innerHTML = `
                        <span class="truncate pr-2">${data.content}</span>
                        <button onclick="deleteMemo('${d.id}')" class="text-white/40 hover:text-white"><i class="fas fa-times text-xs"></i></button>
                    `;
                    list.appendChild(item);
                });
            });
        }

        window.addMemo = async () => {
            const content = prompt('간단한 메모를 입력하세요:');
            if(!content) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'internal_memos'), {
                content,
                createdAt: serverTimestamp()
            });
        };

        window.deleteMemo = async (id) => {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'internal_memos', id));
        };

        // 인쇄 및 견적서 레이아웃
        window.startPrint = () => {
            const client = document.getElementById('client-name').value || "귀하";
            const dateStr = document.getElementById('doc-date').value;
            const [y, m, d] = dateStr.split('-');
            const { subtotal, finalTotal } = calculateTotal();
            const vat = finalTotal - subtotal;
            
            const items = [];
            document.querySelectorAll('.item-row').forEach(row => {
                const name = row.querySelector('.item-name').value;
                if(!name) return;
                const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
                const price = parseFloat(row.querySelector('.item-price').value) || 0;
                // 인쇄 시 공급가액/부가세 분리 표시 로직
                const rowSub = (vatMode === 'exclude') ? price : Math.round(price / 1.1);
                items.push({ name, qty, price: rowSub, amt: qty * rowSub });
            });

            const printArea = document.getElementById('print-area');
            printArea.innerHTML = `
                <div style="width:210mm; min-height:297mm; padding:20mm; background:white; margin:0 auto; font-family:'Noto Sans KR';">
                    <h1 style="text-align:center; font-size:48px; font-weight:900; letter-spacing:20px; text-decoration:underline; margin-bottom:50px;">견 적 서</h1>
                    
                    <div style="display:flex; justify-content:space-between; margin-bottom:40px; align-items: flex-end;">
                        <div>
                            <div style="font-size:26px; font-weight:bold; border-bottom:3px solid black; padding-right:40px; margin-bottom:10px;">${client} <span style="font-size:18px;">귀하</span></div>
                            <div style="font-size:16px; font-weight:500;">${y}년 ${m}월 ${d}일</div>
                            <div style="margin-top:30px; font-size:13px; color:#444;">아래와 같이 견적합니다.</div>
                        </div>
                        <div style="width:380px;">
                            <table style="width:100%; border-collapse:collapse; border:1.5px solid black; font-size:12px;">
                                <tr><td rowspan="4" style="width:20px; border:1px solid black; background:#f1f5f9; text-align:center; font-weight:900;">공<br>급<br>자</td><td style="border:1px solid black; padding:8px; background:#f8fafc; text-align:center; font-weight:bold;">등록번호</td><td colspan="3" style="border:1px solid black; padding:8px; text-align:center; font-weight:bold; font-size:15px;">${PROVIDER_INFO.bizNo}</td></tr>
                                <tr><td style="border:1px solid black; padding:8px; background:#f8fafc; text-align:center; font-weight:bold;">상 호</td><td style="border:1px solid black; padding:8px; text-align:center; font-weight:bold;">${PROVIDER_INFO.name}</td><td style="border:1px solid black; padding:8px; background:#f8fafc; text-align:center; font-weight:bold;">성 명</td><td style="border:1px solid black; padding:8px; text-align:center;">${PROVIDER_INFO.ceo} (인)</td></tr>
                                <tr><td style="border:1px solid black; padding:8px; background:#f8fafc; text-align:center; font-weight:bold;">주 소</td><td colspan="3" style="border:1px solid black; padding:8px; font-size:10px;">${PROVIDER_INFO.address}</td></tr>
                                <tr><td style="border:1px solid black; padding:8px; background:#f8fafc; text-align:center; font-weight:bold;">연락처</td><td style="border:1px solid black; padding:8px; text-align:center;">${PROVIDER_INFO.tel}</td><td style="border:1px solid black; padding:8px; background:#f8fafc; text-align:center; font-weight:bold;">이메일</td><td style="border:1px solid black; padding:8px; text-align:center; font-size:9px;">${PROVIDER_INFO.email}</td></tr>
                            </table>
                        </div>
                    </div>

                    <table style="width:100%; border-collapse:collapse; border:1.5px solid black; font-size:13px; margin-bottom:10px;">
                        <thead><tr style="background:#f1f5f9; font-weight:bold;"><th style="border:1px solid black; padding:12px; width:45%;">품 명 및 규 격</th><th style="border:1px solid black; width:10%;">수량</th><th style="border:1px solid black; width:15%;">단 가</th><th style="border:1px solid black; width:20%;">금 액</th><th style="border:1px solid black; width:10%;">비 고</th></tr></thead>
                        <tbody>
                            ${items.map(item => `<tr><td style="border:1px solid black; padding:12px; font-weight:bold;">${item.name}</td><td style="border:1px solid black; text-align:center;">${item.qty}</td><td style="border:1px solid black; text-align:right; padding-right:10px;">${item.price.toLocaleString()}</td><td style="border:1px solid black; text-align:right; padding-right:10px; font-weight:bold;">${item.amt.toLocaleString()}</td><td style="border:1px solid black;"></td></tr>`).join('')}
                            ${Array(Math.max(0, 12 - items.length)).fill().map(() => `<tr style="height:42px;"><td style="border:1px solid black;"></td><td style="border:1px solid black;"></td><td style="border:1px solid black;"></td><td style="border:1px solid black;"></td><td style="border:1px solid black;"></td></tr>`).join('')}
                        </tbody>
                        <tfoot>
                            <tr><td colspan="3" style="border:1px solid black; text-align:right; padding:12px; font-weight:bold; background:#f8fafc;">공급가액 합계</td><td style="border:1px solid black; text-align:right; padding-right:10px; font-weight:bold;">${subtotal.toLocaleString()}</td><td rowspan="3" style="border:1px solid black;"></td></tr>
                            <tr><td colspan="3" style="border:1px solid black; text-align:right; padding:12px; font-weight:bold; background:#f8fafc;">부 가 세 (10%)</td><td style="border:1px solid black; text-align:right; padding-right:10px; font-weight:bold;">${vat.toLocaleString()}</td></tr>
                            <tr style="background:#f1f5f9;"><td colspan="3" style="border:1px solid black; text-align:right; padding:15px; font-size:20px; font-weight:900;">총 합 계 (VAT 포함)</td><td style="border:1px solid black; text-align:right; padding-right:10px; font-size:20px; font-weight:900; color:#2563eb;">${finalTotal.toLocaleString()}원</td></tr>
                        </tfoot>
                    </table>

                    <div style="margin-top:30px; padding:25px; border:1.5px solid black; border-radius:15px; background:#fcfcfc;">
                        <div style="font-weight:900; font-size:15px; margin-bottom:12px; color:#2563eb;">입금 계좌: ${PROVIDER_INFO.bank}</div>
                        <ul style="font-size:12px; line-height:2.0; color:#555; margin:0; padding-left:20px;">
                            <li>견적 유효기간: 발행일로부터 30일 이내</li>
                            <li>납품 및 완성: 입금 확인 후 최종 작업 착수 후 상호 협의된 일정 내 완료</li>
                            <li>기타 문의사항은 위 연락처로 언제든 연락 바랍니다.</li>
                        </ul>
                    </div>
                </div>
            `;
            window.print();
        };

        // 로그인 핸들러
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) {
                const errDiv = document.getElementById('login-error');
                errDiv.textContent = "권한이 없거나 계정 정보가 일치하지 않습니다.";
                errDiv.classList.remove('hidden');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>
