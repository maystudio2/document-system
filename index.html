<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MayStudio | Secure Sync Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@100;400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        
        /* 로딩 애니메이션 */
        .loader-ring {
            display: inline-block;
            width: 80px;
            height: 80px;
        }
        .loader-ring:after {
            content: " ";
            display: block;
            width: 64px;
            height: 64px;
            margin: 8px;
            border-radius: 50%;
            border: 6px solid #2563eb;
            border-color: #2563eb transparent #2563eb transparent;
            animation: loader-ring 1.2s linear infinite;
        }
        @keyframes loader-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-print { display: block; }
        @media print {
            .no-print { display: none !important; }
            #print-wrap { display: block !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- 시스템 초기화 레이어 (최상위) -->
    <div id="setup-layer" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="loader-ring"></div>
        <div class="mt-8 text-center">
            <h2 id="setup-status" class="text-xl font-black text-slate-800">보안 세션 구성 중...</h2>
            <p id="setup-substatus" class="text-sm text-slate-400 mt-2">Firebase 인스턴스를 초기화하고 있습니다.</p>
        </div>
        <!-- 에러 발생 시 노출 -->
        <div id="setup-error" class="hidden mt-10 p-6 bg-red-50 rounded-2xl border border-red-100 max-w-sm text-center">
            <p class="text-red-600 font-bold text-sm">연결에 실패했습니다.</p>
            <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-red-600 text-white rounded-xl text-xs font-bold">재시도</button>
        </div>
    </div>

    <!-- 메인 애플리케이션 UI -->
    <div id="app-container" class="invisible opacity-0 transition-all duration-1000">
        <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 no-print">
            <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black">M</div>
                    <span class="font-black text-lg">MayStudio <span class="text-blue-600">Enterprise</span></span>
                </div>
                <div id="connection-status" class="flex items-center gap-2 px-3 py-1.5 bg-slate-100 rounded-full text-[10px] font-black text-slate-400">
                    <div class="w-2 h-2 bg-slate-300 rounded-full"></div> AUTH REQUIRED
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 no-print">
            <!-- 입력 영역 -->
            <section class="lg:col-span-8 space-y-6">
                <div class="bg-white rounded-[32px] shadow-xl shadow-slate-200/50 border border-slate-200 overflow-hidden">
                    <div class="p-8 border-b border-slate-100 flex justify-between items-center">
                        <div>
                            <h3 class="text-xl font-black">새 견적서 생성</h3>
                            <p class="text-sm text-slate-400 mt-1">클라우드와 실시간으로 동기화됩니다.</p>
                        </div>
                        <div class="flex bg-slate-100 p-1 rounded-xl">
                            <button onclick="toggleTax(true)" id="tax-on" class="px-4 py-2 rounded-lg text-xs font-bold transition-all">VAT 별도</button>
                            <button onclick="toggleTax(false)" id="tax-off" class="px-4 py-2 rounded-lg text-xs font-bold transition-all">VAT 포함</button>
                        </div>
                    </div>

                    <div class="p-8 space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[11px] font-black text-slate-400 uppercase ml-1">Client</label>
                                <input type="text" id="client-name" placeholder="고객사명" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[11px] font-black text-slate-400 uppercase ml-1">Date</label>
                                <input type="date" id="doc-date" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                            </div>
                        </div>

                        <div class="space-y-4">
                            <div class="flex justify-between items-center">
                                <h4 class="font-bold text-slate-700">세부 항목</h4>
                                <button onclick="addNewRow()" class="text-xs font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg hover:bg-blue-100">
                                    <i class="fas fa-plus mr-1"></i> 항목 추가
                                </button>
                            </div>
                            <div id="items-container" class="space-y-3"></div>
                        </div>
                    </div>

                    <div class="p-8 bg-slate-900 flex flex-col md:flex-row justify-between items-center gap-6 text-white">
                        <div>
                            <span class="text-blue-400 font-bold text-[10px] uppercase tracking-widest">Grand Total</span>
                            <div id="total-display" class="text-3xl font-black mt-1">0원</div>
                        </div>
                        <div class="flex gap-3 w-full md:w-auto">
                            <button onclick="handleCloudSave()" id="save-trigger" class="flex-1 md:flex-none px-8 py-4 bg-white/10 rounded-2xl font-bold hover:bg-white/20">
                                <i class="fas fa-cloud-upload-alt mr-2"></i> 클라우드 저장
                            </button>
                            <button onclick="window.print()" class="flex-1 md:flex-none px-10 py-4 bg-blue-600 rounded-2xl font-black hover:bg-blue-500">
                                <i class="fas fa-print mr-2"></i> 인쇄하기
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 히스토리 사이드바 -->
            <aside class="lg:col-span-4">
                <div class="bg-white rounded-[32px] border border-slate-200 p-6 sticky top-24">
                    <h4 class="font-black text-slate-800 mb-6 flex items-center gap-2">
                        <i class="fas fa-history text-blue-600"></i> 저장된 견적 내역
                    </h4>
                    <div id="history-list" class="space-y-3 max-h-[600px] overflow-y-auto pr-2">
                        <div class="text-center py-20 text-slate-300 text-sm">데이터를 기다리는 중...</div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- 출력용 템플릿 (Hidden) -->
    <div id="print-wrap" class="hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global State
        const state = {
            appId: typeof __app_id !== 'undefined' ? __app_id : 'maystudio-v3',
            user: null,
            db: null,
            auth: null,
            isTaxSeparate: true,
            activeId: null
        };

        // UI Helpers
        const updateStatus = (msg, sub) => {
            document.getElementById('setup-status').innerText = msg;
            document.getElementById('setup-substatus').innerText = sub;
        };

        const showError = () => {
            document.getElementById('setup-error').classList.remove('hidden');
            document.querySelector('.loader-ring').style.display = 'none';
            updateStatus('연결 중단됨', '네트워크 또는 보안 설정을 확인하세요.');
        };

        // Firebase Core Logic (The "Fixed" Way)
        async function startSystem() {
            try {
                // 1. Initialize Firebase
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                state.auth = getAuth(app);
                state.db = getFirestore(app);
                
                updateStatus('보안 인증 시도 중', '사용자 세션을 확인하고 있습니다...');

                // 2. Strict Auth Handling (Rule 3)
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(state.auth, __initial_auth_token);
                } else {
                    await signInAnonymously(state.auth);
                }

                // 3. Wait for Auth State Confirmation
                onAuthStateChanged(state.auth, (user) => {
                    if (user) {
                        state.user = user;
                        finalizeBoot();
                    } else {
                        showError();
                    }
                });

            } catch (err) {
                console.error("Critical Boot Error:", err);
                showError();
            }
        }

        function finalizeBoot() {
            // Update Connection UI
            const indicator = document.getElementById('connection-status');
            indicator.innerHTML = `<div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div> SECURE CONNECTED (UID: ${state.user.uid.slice(0,6)}...)`;
            indicator.className = "flex items-center gap-2 px-3 py-1.5 bg-green-50 rounded-full text-[10px] font-black text-green-600 border border-green-100";

            // Show App
            const setup = document.getElementById('setup-layer');
            const app = document.getElementById('app-container');
            setup.style.opacity = '0';
            setTimeout(() => {
                setup.style.display = 'none';
                app.classList.remove('invisible');
                app.classList.add('opacity-100');
                initAppLogic();
                syncData();
            }, 700);
        }

        // App Business Logic
        function initAppLogic() {
            document.getElementById('doc-date').value = new Date().toISOString().split('T')[0];
            toggleTax(true);
            addNewRow();
        }

        window.toggleTax = (val) => {
            state.isTaxSeparate = val;
            const on = document.getElementById('tax-on');
            const off = document.getElementById('tax-off');
            if(val) {
                on.className = "px-4 py-2 rounded-lg text-xs font-black bg-blue-600 text-white shadow-lg";
                off.className = "px-4 py-2 rounded-lg text-xs font-bold text-slate-400";
            } else {
                off.className = "px-4 py-2 rounded-lg text-xs font-black bg-blue-600 text-white shadow-lg";
                on.className = "px-4 py-2 rounded-lg text-xs font-bold text-slate-400";
            }
            calculate();
        };

        window.addNewRow = (n='', q=1, p='') => {
            const container = document.getElementById('items-container');
            const div = document.createElement('div');
            div.className = "flex gap-3 items-center p-4 bg-white border border-slate-100 rounded-2xl group hover:border-blue-200 transition-all";
            div.innerHTML = `
                <input type="text" value="${n}" placeholder="항목명" class="i-name flex-grow bg-transparent outline-none font-bold text-slate-700">
                <input type="number" value="${q}" placeholder="수량" class="i-qty w-16 text-center bg-slate-50 py-2 rounded-xl outline-none font-black text-slate-800">
                <input type="number" value="${p}" placeholder="단가" class="i-price w-32 text-right bg-slate-50 py-2 px-3 rounded-xl outline-none font-black text-blue-600">
                <button onclick="this.parentElement.remove(); calculate();" class="text-slate-200 hover:text-red-500 p-2"><i class="fas fa-times-circle"></i></button>
            `;
            container.appendChild(div);
            div.querySelectorAll('input').forEach(i => i.oninput = calculate);
            calculate();
        };

        window.calculate = () => {
            let sub = 0;
            document.querySelectorAll('#items-container > div').forEach(row => {
                const q = parseFloat(row.querySelector('.i-qty').value) || 0;
                const p = parseFloat(row.querySelector('.i-price').value) || 0;
                sub += (q * p);
            });
            const final = state.isTaxSeparate ? Math.floor(sub * 1.1) : sub;
            document.getElementById('total-display').innerText = final.toLocaleString() + '원';
            return { sub, final };
        };

        // Firestore Syncing
        async function syncData() {
            if (!state.user) return;
            // Rule 1 & 2: Simple Collection Query
            const path = collection(state.db, 'artifacts', state.appId, 'users', state.user.uid, 'estimates');
            onSnapshot(path, (snap) => {
                const list = document.getElementById('history-list');
                list.innerHTML = '';
                if(snap.empty) {
                    list.innerHTML = '<div class="text-center py-20 text-slate-300 text-sm">기록이 없습니다.</div>';
                    return;
                }
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    const item = document.createElement('div');
                    item.className = "p-4 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer hover:border-blue-500 hover:bg-white transition-all group";
                    item.onclick = () => loadItem(docSnap.id, d);
                    item.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div class="font-bold text-slate-800 text-sm">${d.client || '이름 없음'}</div>
                            <div class="text-[9px] font-black text-slate-300 uppercase">${d.date}</div>
                        </div>
                        <div class="flex justify-between items-end mt-2">
                            <div class="text-[10px] text-blue-500 font-bold">${d.items?.length || 0}개 항목</div>
                            <button onclick="event.stopPropagation(); deleteItem('${docSnap.id}')" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition-all">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </div>
                    `;
                    list.appendChild(item);
                });
            }, (err) => console.error("Firestore Sync Error:", err));
        }

        function loadItem(id, data) {
            state.activeId = id;
            document.getElementById('client-name').value = data.client;
            document.getElementById('doc-date').value = data.date;
            toggleTax(data.isTaxSeparate);
            document.getElementById('items-container').innerHTML = '';
            data.items.forEach(i => addNewRow(i.n, i.q, i.p));
            document.getElementById('save-trigger').innerHTML = '<i class="fas fa-sync mr-2"></i> 클라우드 업데이트';
        }

        window.handleCloudSave = async () => {
            if (!state.user) return;
            const btn = document.getElementById('save-trigger');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 처리 중...';

            const payload = {
                client: document.getElementById('client-name').value,
                date: document.getElementById('doc-date').value,
                isTaxSeparate: state.isTaxSeparate,
                items: Array.from(document.querySelectorAll('#items-container > div')).map(r => ({
                    n: r.querySelector('.i-name').value,
                    q: r.querySelector('.i-qty').value,
                    p: r.querySelector('.i-price').value
                })),
                updatedAt: serverTimestamp()
            };

            try {
                if (state.activeId) {
                    await updateDoc(doc(state.db, 'artifacts', state.appId, 'users', state.user.uid, 'estimates', state.activeId), payload);
                } else {
                    const newDoc = await addDoc(collection(state.db, 'artifacts', state.appId, 'users', state.user.uid, 'estimates'), payload);
                    state.activeId = newDoc.id;
                }
                btn.innerHTML = '<i class="fas fa-check mr-2"></i> 저장 완료';
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = state.activeId ? '<i class="fas fa-sync mr-2"></i> 클라우드 업데이트' : '<i class="fas fa-cloud-upload-alt mr-2"></i> 클라우드 저장';
                }, 2000);
            } catch (err) {
                alert("저장 실패: " + err.message);
                btn.disabled = false;
                btn.innerText = "다시 시도";
            }
        };

        window.deleteItem = async (id) => {
            if (confirm('정말 삭제하시겠습니까?')) {
                await deleteDoc(doc(state.db, 'artifacts', state.appId, 'users', state.user.uid, 'estimates', id));
                if (state.activeId === id) {
                    state.activeId = null;
                    document.getElementById('client-name').value = '';
                    document.getElementById('items-container').innerHTML = '';
                    addNewRow();
                }
            }
        };

        window.onload = startSystem;
    </script>
</body>
</html>
